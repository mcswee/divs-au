<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne Radio — Station History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --accent: #d4a843;
    --accent2: #b8813a;
    --text: #e8e0d4;
    --text-muted: #7a7268;
    --text-dim: #4a4540;
    --red: #c0392b;
    --green: #27ae60;
    --blue: #2980b9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .site-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    line-height: 1;
  }

  .site-subtitle {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 5px;
    letter-spacing: 0.02em;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 160px;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .year-display {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    min-width: 56px;
    text-align: right;
    letter-spacing: 0.04em;
  }

  .btn {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .btn:hover, .btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(212,168,67,0.07);
  }

  .btn-play {
    border-color: var(--accent2);
    color: var(--accent);
    background: rgba(212,168,67,0.08);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 18px;
  }

  .btn-play:hover { background: rgba(212,168,67,0.15); }

  input[type="text"], input[type="search"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    width: 180px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus, input[type="search"]:focus {
    border-color: var(--accent);
  }

  input::placeholder { color: var(--text-dim); }

  /* MAIN */
  .main {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 32px 48px;
  }

  /* VIEW TOGGLE */
  .view-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .view-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .view-tab {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    border-right: 1px solid var(--border);
  }

  .view-tab:last-child { border-right: none; }

  .view-tab.active {
    background: rgba(212,168,67,0.1);
    color: var(--accent);
  }

  .results-count {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .results-count span {
    color: var(--accent);
    font-weight: 600;
  }

  /* CARD GRID */
  #card-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .station-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0;
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s;
    animation: fadeIn 0.25s ease both;
    cursor: pointer;
    position: relative;
  }

  .station-card:hover {
    border-color: var(--accent2);
    transform: translateY(-1px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: var(--surface2);
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-callsign {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
    line-height: 1;
  }

  .card-freq {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    white-space: nowrap;
    margin-top: 2px;
  }

  .card-freq .freq-unit {
    font-size: 10px;
    color: var(--text-dim);
    margin-left: 2px;
  }

  .card-marketing {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.2);
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-body {
    padding: 12px 16px 14px;
  }

  .card-field {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: baseline;
  }

  .card-field:last-child { margin-bottom: 0; }

  .field-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 52px;
    padding-top: 1px;
  }

  .field-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .field-value.empty {
    color: var(--text-dim);
    font-style: italic;
    font-size: 12px;
  }

  .card-date-tag {
    position: absolute;
    top: 14px;
    right: 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--green);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-date-tag::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }

  /* TABLE VIEW */
  #table-view {
    overflow-x: auto;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .data-table th {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }

  .data-table td {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(42,42,42,0.5);
    vertical-align: middle;
  }

  .data-table tr:hover td {
    background: rgba(212,168,67,0.03);
  }

  .td-callsign {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .td-freq {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .td-marketing {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
  }

  .td-date {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    color: var(--green);
    white-space: nowrap;
  }

  .empty-cell {
    color: var(--text-dim);
    font-style: italic;
    font-size: 12px;
  }

  /* TIMELINE VIEW */
  #timeline-view {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .timeline-row {
    display: flex;
    border-bottom: 1px solid rgba(42,42,42,0.4);
    transition: background 0.1s;
  }

  .timeline-row:hover { background: rgba(212,168,67,0.02); }

  .timeline-station {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.06em;
    min-width: 80px;
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
  }

  .timeline-events {
    flex: 1;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    padding: 8px 14px;
    gap: 8px;
  }

  .timeline-event {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    min-width: 180px;
    max-width: 300px;
  }

  .event-year {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .event-owner {
    font-size: 12px;
    color: var(--text);
    line-height: 1.3;
  }

  .event-marketing {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text-dim);
  }

  .empty-state h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--text-muted);
  }

  .empty-state p {
    font-size: 13px;
    font-style: italic;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }

  .chip:hover, .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(212,168,67,0.08);
  }

  /* TICKER */
  .period-tag {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .hidden { display: none !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="site-title">Melbourne Radio History</div>
      <div class="site-subtitle">Station records 1924–2026 &mdash; call signs, ownership &amp; broadcast brands</div>
    </div>
    <div class="controls">
      <div class="control-group">
        <div class="control-label">Year</div>
        <div class="control-row">
          <input type="range" id="year-slider" min="1924" max="2026" value="2026" step="1">
          <div class="year-display" id="year-label">2026</div>
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">Playback</div>
        <div class="control-row">
          <button class="btn btn-play" id="play-btn" onclick="togglePlay()">
            <span id="play-icon">▶</span>
            <span id="play-label">Play</span>
          </button>
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">Search</div>
        <input type="search" id="search-input" placeholder="Station, owner…" oninput="render()">
      </div>
    </div>
  </div>
</header>

<main class="main">
  <div class="view-controls">
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('cards', this)">Cards</button>
      <button class="view-tab" onclick="setView('table', this)">Table</button>
      <button class="view-tab" onclick="setView('timeline', this)">Timeline</button>
    </div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <div class="filter-chips" id="filter-chips">
        <button class="chip active" onclick="setFilter('all', this)">All changes</button>
        <button class="chip" onclick="setFilter('new', this)">New stations</button>
        <button class="chip" onclick="setFilter('owner', this)">Ownership changes</button>
        <button class="chip" onclick="setFilter('brand', this)">Brand changes</button>
      </div>
      <div class="results-count" id="results-count"></div>
    </div>
  </div>

  <div id="card-view"></div>
  <div id="table-view" class="hidden"></div>
  <div id="timeline-view" class="hidden"></div>
</main>
