<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melbourne Train Departures — divs.au</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #ffffff;
      --text:       #111111;
      --dim:        #666666;
      --border:     #e0e0e0;
      --row-hover:  #f7f7f7;
      --plat-bg:    #f2f2f2;
      --pat-bg:     #f8f8f8;
      --font:       'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 1.25rem 3rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.5rem 0 1.25rem;
      border-bottom: 2px solid var(--text);
      margin-bottom: 1.75rem;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .site-tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    #clock {
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    /* ── Station selector ── */
    .selector-wrap {
      position: relative;
    }

    .selector-wrap::after {
      content: '▾';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      pointer-events: none;
      font-size: 0.85rem;
    }

    #station-select {
      width: 100%;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.35rem 1.5rem 0.35rem 0;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      outline: none;
    }

    #station-select:focus {
      border-bottom-color: var(--text);
    }

    /* ── Status messages ── */
    .msg {
      padding: 2rem 0;
      color: var(--dim);
      font-size: 0.9rem;
    }

    /* ── Platform section ── */
    .platform {
      margin-bottom: 1.25rem;
    }

    .platform-hdr {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      background: var(--plat-bg);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 0.75rem;
    }

    /* ── Departure row ── */
    .dep {
      display: grid;
      grid-template-columns: 2.75rem 3rem 1fr auto;
      align-items: center;
      gap: 0.875rem;
      padding: 0.8rem 0.75rem;
      border-bottom: 1px solid var(--border);
      border-left: 4px solid var(--lc, #ccc);
      cursor: pointer;
      transition: background 0.08s;
      user-select: none;
      -webkit-user-select: none;
    }

    .dep:hover, .dep.open { background: var(--row-hover); }

    /* Scheduled time */
    .dep-time {
      font-size: 0.9rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    /* Real-time actual time (shown when delay data available) */
    .dep-time.delayed .sched {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--dim);
      text-decoration: line-through;
      display: block;
    }

    .dep-time .actual {
      display: block;
    }

    /* Countdown */
    .dep-mins {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--dim);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .dep-mins.soon { color: #c00; font-weight: 600; }

    /* Route + destination */
    .dep-info {
      min-width: 0;
    }

    .dep-dest {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dep-route {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--dim);
      margin-top: 0.1rem;
    }

    /* Expand caret */
    .dep-caret {
      font-size: 0.6rem;
      color: var(--dim);
      padding-left: 0.25rem;
      flex-shrink: 0;
    }

    /* ── Stopping pattern ── */
    .pattern {
      background: var(--pat-bg);
      border-bottom: 1px solid var(--border);
      border-left: 4px solid var(--lc, #ccc);
      padding: 0.5rem 0;
    }

    .pat-stop {
      display: grid;
      grid-template-columns: 2.75rem 1fr;
      gap: 0.875rem;
      padding: 0.275rem 0.75rem;
      font-size: 0.83rem;
    }

    .pat-stop.is-here {
      font-weight: 700;
    }

    .pat-stop.is-end {
      font-weight: 600;
    }

    .pat-time {
      font-variant-numeric: tabular-nums;
      color: var(--dim);
    }

    .pat-stop.is-here .pat-time,
    .pat-stop.is-end .pat-time {
      color: var(--text);
    }

    /* loading indicator inside pattern */
    .pat-loading {
      padding: 0.5rem 0.75rem;
      font-size: 0.83rem;
      color: var(--dim);
    }

    /* ── Alerts ── */
    .alerts {
      margin-bottom: 1.25rem;
    }

    .alert {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      border-left: 4px solid;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      cursor: pointer;
      user-select: none;
    }

    .alert + .alert { margin-top: 2px; }

    .alert--critical { border-color: #c00;    }
    .alert--warning  { border-color: #d97706; }
    .alert--info     { border-color: #2563eb; }

    .alert-hdr {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .alert-desc {
      font-size: 0.78rem;
      color: var(--dim);
      line-height: 1.4;
      margin-top: 0.25rem;
      display: none;
    }

    .alert.expanded .alert-desc { display: block; }

    .alert-caret {
      font-size: 0.6rem;
      color: var(--dim);
      padding-top: 0.15rem;
    }

    /* ── Notice ── */
    .rt-badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.1rem 0.35rem;
      border-radius: 2px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .rt-ontime  { background: #fff3cd; color: #856404; /*background: #e6f4ea; color: #1a7f37; */}
    .rt-late    { background: #fde8e8; color: #c00; }
    .rt-early   { background: #fff3cd; color: #856404; }

    /* ── Footer ── */
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--dim);
    }

    footer a { color: inherit; text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .dep {
        grid-template-columns: 2.5rem 2.75rem 1fr auto;
        gap: 0.625rem;
        padding: 0.7rem 0.625rem;
      }
      h1, #clock { font-size: 1.25rem; }
      .dep-dest { font-size: 0.875rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="wordmark">
        <span class="site-tag">divs.au</span>
        <h1>Melbourne Trains</h1>
      </div>
      <span id="clock"></span>
    </div>
    <div class="selector-wrap">
      <select id="station-select" aria-label="Select station">
        <option value="">Select a station…</option>
      </select>
    </div>
  </header>

  <main id="board">
    <p class="msg">Select a station to see upcoming departures.</p>
  </main>

  <footer>
    Scheduled times with live delay data.
    <span id="rt-status"></span>
    Data: <a href="https://www.ptv.vic.gov.au/footer/data-and-reporting/datasets/gtfs/" target="_blank" rel="noopener">PTV GTFS</a> &amp; <a href="https://opendata.transport.vic.gov.au/dataset/gtfs-realtime" target="_blank" rel="noopener">GTFS-R</a>.
    For disruptions see <a href="https://www.ptv.vic.gov.au" target="_blank" rel="noopener">PTV</a>.
  </footer>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const DATA  = '/assets/data/trains';
const RT    = 'https://melb-trains-rt.dj-mcsw-ee.workers.dev/';
const POLL  = 30_000;

// ── State ─────────────────────────────────────────────────────────────────────
let stations    = [];
let stationData = null;
let openTrip    = null;
let patCache    = {};   // route → {trip_id: [[name, "HH:MM"]]}
let rtData      = null; // latest real-time snapshot

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  tick();
  setInterval(tick, 15_000);
  if (RT) {
    pollRT();
    setInterval(pollRT, POLL);
  }
  try {
    const r = await fetch(`${DATA}/stations.json`);
    const d = await r.json();
    stations = d.stations;
    buildDropdown(stations);
  } catch {
    setBoard('<p class="msg">Could not load station list.</p>');
  }
  document.getElementById('station-select')
    .addEventListener('change', e => loadStation(e.target.value));
})();

// ── Dropdown ──────────────────────────────────────────────────────────────────
function buildDropdown(list) {
  const sel = document.getElementById('station-select');
  list.forEach(s => {
    const o = document.createElement('option');
    o.value = s.id;
    o.textContent = s.name;
    sel.appendChild(o);
  });
}

// ── Load station ──────────────────────────────────────────────────────────────
async function loadStation(id) {
  if (!id) { setBoard('<p class="msg">Select a station to see upcoming departures.</p>'); return; }
  setBoard('<p class="msg">Loading…</p>');
  openTrip = null;
  try {
    const r = await fetch(`${DATA}/departures_${safeFn(id)}.json`);
    stationData = await r.json();
    render();
  } catch {
    setBoard('<p class="msg">Could not load departures for this station.</p>');
  }
}

// ── Real-time ─────────────────────────────────────────────────────────────────
async function pollRT() {
  if (!RT) return;
  try {
    const r = await fetch(RT);
    rtData = await r.json();
    const el = document.getElementById('rt-status');
    if (el) el.textContent = 'Live data active.';
    if (stationData) render();
  } catch {
    // silent — fall back to scheduled times
  }
}

function rtDelay(tripId) {
  // Returns delay in seconds, or null if no real-time data
  return rtData?.trips?.[tripId]?.delay ?? null;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (!stationData) return;

  const nowMin    = nowMins();
  const today     = dayType();
  const todayNum  = todayDate();

  // Filter to today's valid services, not yet departed (1 min grace)
  const raw = stationData.departures.filter(d => {
    if (!d.days[today]) return false;
    if (d.days.from  && todayNum < d.days.from)  return false;
    if (d.days.until && todayNum > d.days.until) return false;
    const t = hm2min(d.departs);
    if (t >= 1440) return false;
    const delay  = rtDelay(d.trip_id) ?? 0;
    const actual = t + Math.round(delay / 60);
    return actual >= nowMin - 1;
  });

  // Deduplicate after date filtering: PTV issues multiple service_ids for
  // the same physical service. Two entries with the same route, platform
  // and departure time are the same train — keep only the first.
  const seenKeys = new Set();
  const upcoming = raw.filter(d => {
    const key = `${d.plat}|${d.departs}|${d.route}`;
    if (seenKeys.has(key)) return false;
    seenKeys.add(key);
    return true;
  });

  // Group by platform, cap at 3 per platform
  const byPlat = {};
  upcoming.forEach(d => {
    const p = d.plat || '—';
    if (!byPlat[p]) byPlat[p] = [];
    if (byPlat[p].length < 3) byPlat[p].push(d);
  });

  const plats = Object.keys(byPlat).sort(platSort);
  if (!plats.length) {
    setBoard('<p class="msg">No upcoming services for today.</p>');
    return;
  }

  const frag = document.createDocumentFragment();

  // Alerts for this station (prepended above platforms)
  const stationAlerts = alertsForStation();
  if (stationAlerts.length) frag.appendChild(buildAlerts(stationAlerts));

  plats.forEach(p => frag.appendChild(buildPlatform(p, byPlat[p])));

  const board = document.getElementById('board');
  board.innerHTML = '';
  board.appendChild(frag);
}

// ── Alerts ────────────────────────────────────────────────────────────────────

// Map route display names to the codes used in alert route IDs
const ROUTE_CODES = {
  'Frankston': 'FKN', 'Stony Point': 'STP',
  'Belgrave': 'BEG', 'Lilydale': 'LIL', 'Alamein': 'ALM', 'Glen Waverley': 'GWY',
  'Craigieburn': 'CGB', 'Upfield': 'UFD',
  'Mernda': 'MDD', 'Hurstbridge': 'HBE',
  'Pakenham': 'PKM', 'Cranbourne': 'CBE', 'Sunbury': 'SUY',
  'Sandringham': 'SHM', 'Werribee': 'WER', 'Williamstown': 'WIL',
  'Flemington Racecourse': 'FGS',
};

// Only show alerts with meaningful service impacts — skip OTHER_EFFECT (car parks etc.)
const SHOW_EFFECTS = new Set([
  'NO_SERVICE', 'REDUCED_SERVICE', 'SIGNIFICANT_DELAYS', 'MODIFIED_SERVICE'
]);

function alertsForStation() {
  if (!rtData?.alerts?.length || !stationData) return [];

  // Build set of route codes serving this station
  const codes = new Set(
    stationData.departures
      .map(d => ROUTE_CODES[d.route])
      .filter(Boolean)
  );

  // Filter alerts to those affecting this station's routes and worth showing
  return rtData.alerts.filter(a => {
    if (!SHOW_EFFECTS.has(a.effect)) return false;
    return a.routes.some(r => [...codes].some(c => r.includes(`-${c}`)));
  });
}

function buildAlerts(alerts) {
  const container = el('div', 'alerts');

  alerts.forEach(a => {
    const item = el('div', `alert alert--${effectClass(a.effect)}`);

    const main   = el('div', 'alert-main');
    const hdr    = el('div', 'alert-hdr');
    hdr.textContent = a.header;
    const desc   = el('div', 'alert-desc');
    desc.textContent = a.description;
    main.append(hdr, desc);

    const caret  = el('span', 'alert-caret');
    caret.textContent = '▼';

    item.append(main, caret);
    item.addEventListener('click', () => {
      item.classList.toggle('expanded');
      caret.textContent = item.classList.contains('expanded') ? '▲' : '▼';
    });

    container.appendChild(item);
  });

  return container;
}

function effectClass(effect) {
  if (effect === 'NO_SERVICE')           return 'critical';
  if (effect === 'REDUCED_SERVICE')      return 'critical';
  if (effect === 'SIGNIFICANT_DELAYS')   return 'warning';
  if (effect === 'MODIFIED_SERVICE')     return 'info';
  return 'info';
}

// ── Platform ──────────────────────────────────────────────────────────────────
function buildPlatform(plat, services) {
  const sec = el('section', 'platform');
  const hdr = el('div', 'platform-hdr');
  hdr.textContent = plat === '—' ? 'Platform unknown' : `Platform ${plat}`;
  sec.appendChild(hdr);
  services.forEach(dep => {
    sec.appendChild(buildDep(dep));
    if (openTrip === dep.trip_id) sec.appendChild(buildPattern(dep));
  });
  return sec;
}

// ── Departure row ─────────────────────────────────────────────────────────────
function buildDep(dep) {
  const row = el('div', 'dep' + (openTrip === dep.trip_id ? ' open' : ''));
  row.style.setProperty('--lc', dep.colour);
  row.setAttribute('role', 'button');
  row.setAttribute('tabindex', '0');

  const nowMin  = nowMins();
  const schedMin = hm2min(dep.departs);
  const delay   = rtDelay(dep.trip_id);  // seconds or null
  const delaySec = delay ?? 0;
  const actualMin = schedMin + Math.round(delaySec / 60);
  const minsAway  = actualMin - nowMin;

  // Time cell
  const timeEl = el('span', 'dep-time');
  if (delay !== null && delaySec !== 0) {
    timeEl.classList.add('delayed');
    const sched  = el('span', 'sched');
    sched.textContent = dep.departs;
    const actual = el('span', 'actual');
    actual.textContent = to_hhmm(actualMin);
    timeEl.append(sched, actual);
  } else {
    const actual = el('span', 'actual');
    actual.textContent = dep.departs;
    timeEl.appendChild(actual);
  }

  // Mins countdown
  const minsEl = el('span', 'dep-mins' + (minsAway <= 2 ? ' soon' : ''));
  minsEl.textContent = minsAway <= 0 ? 'Now'
                     : minsAway === 1 ? '1 min'
                     : `${minsAway} min`;

  // Destination + route line
  const info = el('div', 'dep-info');
  const dest = el('div', 'dep-dest');

  // Real-time badge
  let badge = '';
  if (delay !== null) {
    if (delaySec <= 60)       badge = '<span class="rt-badge rt-ontime">On time</span>';
    else if (delaySec > 60)   badge = `<span class="rt-badge rt-late">${Math.round(delaySec/60)} min late</span>`;
    else                      badge = '<span class="rt-badge rt-early">Early</span>';
  }
  dest.innerHTML = escHtml(dep.dest) + badge;

  const route = el('div', 'dep-route');
  route.textContent = dep.route;
  info.append(dest, route);

  // Caret
  const caret = el('span', 'dep-caret');
  caret.textContent = openTrip === dep.trip_id ? '▲' : '▼';

  row.append(timeEl, minsEl, info, caret);

  const toggle = async () => {
    if (openTrip === dep.trip_id) { openTrip = null; render(); return; }
    openTrip = dep.trip_id;
    render();
    await ensurePattern(dep.route);
    render();
  };
  row.addEventListener('click', toggle);
  row.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });

  return row;
}

// ── Stopping pattern ──────────────────────────────────────────────────────────
async function ensurePattern(route) {
  if (patCache[route]) return;
  try {
    const r = await fetch(`${DATA}/patterns_${safeFn(route)}.json`);
    patCache[route] = await r.json();
  } catch {
    patCache[route] = {};
  }
}

function buildPattern(dep) {
  const wrap = el('div', 'pattern');
  wrap.style.setProperty('--lc', dep.colour);

  const trips = patCache[dep.route];
  const full  = trips && trips[dep.trip_id];

  if (!full) {
    const loading = el('div', 'pat-loading');
    loading.textContent = 'Loading stops…';
    wrap.appendChild(loading);
    return wrap;
  }

  const stops = full.slice(dep.pat_idx);
  const last  = stops.length - 1;

  stops.forEach(([name, time], i) => {
    const row = el('div', 'pat-stop' +
      (i === 0    ? ' is-here' : '') +
      (i === last ? ' is-end'  : ''));
    const t = el('span', 'pat-time');
    t.textContent = time;
    const n = el('span', 'pat-name');
    n.textContent = name;
    row.append(t, n);
    wrap.appendChild(row);
  });

  return wrap;
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes());
  if (stationData) render();
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function nowMins() {
  const n = new Date(); return n.getHours() * 60 + n.getMinutes();
}

function dayType() {
  const d = new Date().getDay();
  return d === 0 ? 'sunday' : d === 6 ? 'saturday' : 'weekday';
}

function todayDate() {
  const n = new Date();
  return n.getFullYear() * 10000 + (n.getMonth() + 1) * 100 + n.getDate();
}

function hm2min(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function to_hhmm(mins) {
  const [h, m] = [Math.floor(mins / 60), mins % 60];
  return `${pad(h)}:${pad(m)}`;
}

function platSort(a, b) {
  if (a === '—') return 1;
  if (b === '—') return -1;
  const na = parseInt(a), nb = parseInt(b);
  if (!isNaN(na) && !isNaN(nb)) return na - nb;
  return a.localeCompare(b, undefined, { numeric: true });
}

function safeFn(s) { return s.replace(/[^A-Za-z0-9_\-]/g, '_'); }
function pad(n)    { return String(n).padStart(2, '0'); }
function el(t, c)  { const e = document.createElement(t); if (c) e.className = c; return e; }
function setBoard(h) { document.getElementById('board').innerHTML = h; }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
