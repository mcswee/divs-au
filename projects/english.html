<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Australian English Phonology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #faf7f2;
    --ink: #1a1610;
    --ink-mid: #5a5040;
    --ink-faint: #b0a090;
    --accent: #c1440e;
    --accent-pale: #f0e0d8;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', serif;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    padding: 3rem 2rem 0;
    max-width: 1100px;
    margin: 0 auto;
  }

  .site-title {
    font-family: var(--serif);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }

  .site-title span {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }

  .site-sub {
    margin-top: 0.5rem;
    font-size: 0.75rem;
    color: var(--ink-mid);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .legend {
    margin-top: 2rem;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    align-items: center;
    font-size: 0.72rem;
    color: var(--ink-mid);
    border-top: 1px solid var(--ink-faint);
    padding-top: 1rem;
  }

  .legend-item { display: flex; align-items: center; gap: 0.4rem; }

  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-dot--symbol { background: var(--ink); }
  .legend-dot--ipa { background: transparent; border: 1px solid var(--ink-mid); }
  .legend-dot--transcript { background: var(--accent-pale); border: 1px solid var(--accent); }

  .legend-hint {
    margin-left: auto;
    color: var(--ink-faint);
    font-size: 0.68rem;
  }

  /* TABS */
  .tabs {
    max-width: 1100px;
    margin: 2.5rem auto 0;
    padding: 0 2rem;
    display: flex;
    border-bottom: 2px solid var(--ink);
  }

  .tab {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 1.5rem;
    color: var(--ink-mid);
    position: relative;
    transition: color 0.15s;
  }

  .tab::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.15s;
  }

  .tab:hover { color: var(--ink); }

  .tab.active {
    color: var(--ink);
    font-weight: 500;
  }

  .tab.active::after { transform: scaleX(1); }

  .tab-count {
    display: inline-block;
    margin-left: 0.4rem;
    font-size: 0.65rem;
    color: var(--ink-faint);
  }

  /* GRID */
  .grid {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--ink-faint);
    border: 1px solid var(--ink-faint);
  }

  .panel { display: none; }
  .panel.active { display: contents; }

  /* CARD */
  .card {
    background: var(--surface);
    padding: 1.25rem 1.25rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    cursor: pointer;
    transition: background 0.12s;
  }

  .card:hover { background: var(--bg); }
  .card.playing { background: var(--accent-pale); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .symbol-block {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .symbol {
    font-family: var(--serif);
    font-size: 2.2rem;
    font-weight: 600;
    line-height: 1;
    color: var(--accent);
  }

  .ipa {
    font-size: 0.8rem;
    color: var(--ink-faint);
    font-style: italic;
  }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    justify-content: flex-end;
  }

  .example-word {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    color: var(--ink-mid);
    background: var(--bg);
    padding: 0.15rem 0.4rem;
    border: 1px solid var(--ink-faint);
  }

  .sentence {
    font-family: var(--serif);
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--ink-mid);
    line-height: 1.5;
    font-style: italic;
  }

  .transcript {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--ink);
    line-height: 1.6;
    background: var(--accent-pale);
    border-left: 2px solid var(--accent);
    padding: 0.5rem 0.6rem;
    word-break: break-word;
  }

  .play-btn {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: none;
    border: 1px solid var(--ink-faint);
    color: var(--ink-mid);
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    transition: all 0.12s;
    text-transform: uppercase;
  }

  .play-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .play-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-pale);
  }

  @media (max-width: 600px) {
    .site-header { padding: 2rem 1rem 0; }
    .tabs { padding: 0 1rem; }
    .grid { padding: 0 1rem 3rem; margin: 1.5rem auto; }
    .tab { padding: 0.65rem 1rem; }
    .legend-hint { display: none; }
  }
</style>
</head>

// Build icons
const iconPlay = `<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M2.5 2l8 4-8 4V2z"/></svg>`;
const iconStop = `<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="2" y="2" width="3.5" height="8" rx="0.5"/><rect x="6.5" y="2" width="3.5" height="8" rx="0.5"/></svg>`;

let currentUtterance = null;
let currentPlayingId = null;

function stopCurrent() {
  window.speechSynthesis.cancel();
  if (currentPlayingId !== null) {
    const prev = document.querySelector(`.card[data-id="${currentPlayingId}"]`);
    if (prev) {
      prev.classList.remove('playing');
      const btn = prev.querySelector('.play-btn');
      if (btn) { btn.classList.remove('active'); btn.innerHTML = iconPlay + '<span>play</span>'; }
    }
  }
  currentPlayingId = null;
}

function playCard(p) {
  if (currentPlayingId === p.id) { stopCurrent(); return; }
  stopCurrent();

  const utt = new SpeechSynthesisUtterance(p.sentence);
  utt.lang = 'en-AU';
  utt.rate = 0.88;
  const voices = window.speechSynthesis.getVoices();
  const auVoice = voices.find(v => v.lang === 'en-AU') || null;
  if (auVoice) utt.voice = auVoice;

  currentPlayingId = p.id;
  const card = document.querySelector(`.card[data-id="${p.id}"]`);
  if (card) {
    card.classList.add('playing');
    const btn = card.querySelector('.play-btn');
    if (btn) { btn.classList.add('active'); btn.innerHTML = iconStop + '<span>playing…</span>'; }
  }

  utt.onend = utt.onerror = () => {
    if (currentPlayingId === p.id) {
      currentPlayingId = null;
      if (card) {
        card.classList.remove('playing');
        const btn = card.querySelector('.play-btn');
        if (btn) { btn.classList.remove('active'); btn.innerHTML = iconPlay + '<span>play</span>'; }
      }
    }
  };

  window.speechSynthesis.speak(utt);
}

function buildCard(p) {
  const exampleHtml = p.examples.map(e => `<span class="example-word">${e}</span>`).join('');
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.id = p.id;
  div.innerHTML = `
    <div class="card-header">
      <div class="symbol-block">
        <span class="symbol">${p.symbol}</span>
        <span class="ipa">/${p.ipa}/</span>
      </div>
      <div class="examples">${exampleHtml}</div>
    </div>
    <div class="sentence">${p.sentence}</div>
    <div class="transcript">${p.transcript}</div>
    <button class="play-btn" aria-label="Play sentence">${iconPlay}<span>play</span></button>
  `;
  div.addEventListener('click', () => playCard(p));
  div.querySelector('.play-btn').addEventListener('click', e => { e.stopPropagation(); playCard(p); });
  return div;
}

// Populate panels
const vowelPanel = document.getElementById('panel-vowels');
const consonantPanel = document.getElementById('panel-consonants');

phonemes.forEach(p => {
  const card = buildCard(p);
  if (p.type === 'vowel') vowelPanel.appendChild(card);
  else consonantPanel.appendChild(card);
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    stopCurrent();
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// Load voices (some browsers need this trigger)
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
</script>
