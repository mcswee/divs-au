<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITU Callsign Prefix History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e1117;
  --surface: #161b27;
  --border: #252d3d;
  --text: #c9d1e0;
  --muted: #5a6478;
  --accent: #4a9eff;
  --accent2: #f0a500;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

header {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  padding: 14px 24px 12px;
}
header h1 {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.02em;
}
header p {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
  margin-top: 2px;
}

.controls {
  flex-shrink: 0;
  padding: 9px 24px;
  display: flex;
  gap: 10px;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.search-wrap { position: relative; flex: 1; max-width: 300px; }
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 10px 6px 28px;
  border-radius: 3px;
  outline: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }

.mode-tabs { display: flex; gap: 4px; }
.mode-tab {
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-radius: 3px;
}
.mode-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.mode-tab:hover:not(.active) { color: var(--accent); border-color: var(--accent); }

.main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

.list-panel {
  width: 190px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
}
.list-panel::-webkit-scrollbar { width: 3px; }
.list-panel::-webkit-scrollbar-thumb { background: var(--border); }

.prefix-item {
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  user-select: none;
}
.prefix-item:hover { background: rgba(74,158,255,0.08); }
.prefix-item.selected { background: rgba(74,158,255,0.15); color: var(--accent); }
.prefix-item .holder { font-size: 10px; color: var(--muted); max-width: 70px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 22px 28px;
  min-width: 0;
}
.detail-panel::-webkit-scrollbar { width: 4px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--border); }

.empty-state {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  text-align: center;
  line-height: 2.2;
}

footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 7px 24px;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
}
footer a { color: var(--muted); }
footer a:hover { color: var(--accent); }

/* Detail */
.detail-title {
  font-family: var(--mono);
  font-size: 30px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 3px;
}
.detail-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; font-family: var(--mono); }
.detail-sub em { color: var(--accent2); font-style: normal; }

.section-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 7px;
}

.timeline-track {
  display: flex;
  height: 30px;
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 3px;
}
.seg {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  overflow: hidden;
  cursor: default;
  flex-shrink: 0;
}

.year-axis { position: relative; height: 15px; margin-bottom: 18px; }
.year-tick {
  position: absolute;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  transform: translateX(-50%);
}

.note {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  background: #1e1a2a;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 6px 10px;
  margin-bottom: 14px;
  font-style: italic;
}

.events-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12px;
  margin-bottom: 20px;
}
.events-table th {
  text-align: left;
  padding: 5px 10px;
  color: var(--muted);
  font-weight: 400;
  font-size: 10px;
  border-bottom: 1px solid var(--border);
}
.events-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.events-table tr:last-child td { border-bottom: none; }
.events-table tr:hover td { background: rgba(255,255,255,0.02); }

.flag-cell { font-size: 16px; width: 44px; white-space: nowrap; }
.yr { color: var(--accent2); font-weight: 600; }
.iso { color: var(--muted); font-size: 10px; }

.badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 2px;
  font-size: 10px;
  border: 1px solid var(--border);
}
.badge-empty { background: #1e2330; color: var(--muted); }
.badge-unavail { background: #1a1a1a; color: #444; }
.badge-pre { background: #1e1a2a; color: var(--muted); font-style: italic; }

/* Country mode */
.country-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.country-flag { font-size: 34px; line-height: 1; }
.country-name { font-size: 20px; font-weight: 600; color: #fff; }
.country-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
.chip {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 9px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--surface);
  cursor: pointer;
  color: var(--text);
}
.chip:hover { border-color: var(--accent); color: var(--accent); }

.tooltip {
  position: fixed;
  background: #1a2035;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 5px 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  pointer-events: none;
  z-index: 9999;
  display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  white-space: nowrap;
}

.legend {
  display: flex;
  gap: 16px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}
.legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 2px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
</style>
</head>

    var seg = segs[s];
    var pct = ((seg.end - seg.start + 1) / totalSpan * 100).toFixed(3);
    var isPre = seg.end < PRE27;
    var bg, tc, lbl;
    if (!seg.country) {
      bg = '#1e2330'; tc = 'var(--muted)'; lbl = '';
    } else if (seg.country === 'ZZ') {
      bg = '#111'; tc = '#333'; lbl = '';
    } else if (isPre) {
      bg = '#1e1a2a'; tc = '#4a5060'; lbl = parseFloat(pct) > 3 ? seg.country : '';
    } else {
      bg = countryColor(seg.country); tc = '#fff'; lbl = parseFloat(pct) > 2 ? seg.country : '';
    }
    trackHTML += '<div class="seg" style="width:' + pct + '%;background:' + bg + ';color:' + tc + ';" data-s="' + seg.start + '" data-e="' + seg.end + '" data-c="' + (seg.country||'') + '">' + lbl + '</div>';
  }

  var tickYears = [1906,1920,1930,1940,1950,1960,1970,1980,1990,2000,2010,2024];
  var axisHTML = '';
  for (var t = 0; t < tickYears.length; t++) {
    var ty = tickYears[t];
    var pctT = ((ty - YEAR_MIN) / (YEAR_MAX - YEAR_MIN) * 100).toFixed(1);
    axisHTML += '<span class="year-tick" style="left:' + pctT + '%">' + ty + '</span>';
  }

  // Legend
  var legendHTML = '<div class="legend">' +
    '<div class="legend-item"><div class="legend-swatch" style="background:#2d6a9f"></div>Assigned</div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:#1e2330"></div>Unassigned</div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:#111;border-color:#333"></div>Unavailable (ZZ)</div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:#1e1a2a"></div>Pre-1927 (informal)</div>' +
    '</div>';

  // Events table
  var hasPreNote = false;
  var tableRows = '';
  for (var h = 0; h < history.length; h++) {
    var entry = history[h];
    var c = entry.country;
    if (c && entry.year < PRE27) hasPreNote = true;
    var flags = flagsForCode(c);
    var isPre2 = c && entry.year < PRE27;
    var preBadge = isPre2 ? ' <span class="badge badge-pre">pre-1927</span>' : '';

    if (!c) {
      tableRows += '<tr><td class="flag-cell"></td><td class="yr">' + entry.year + '</td><td><span class="badge badge-empty">Unassigned</span></td><td></td></tr>';
    } else if (c === 'ZZ') {
      tableRows += '<tr><td class="flag-cell"></td><td class="yr">' + entry.year + '</td><td><span class="badge badge-unavail">Unavailable</span></td><td class="iso">ZZ</td></tr>';
    } else {
      tableRows += '<tr><td class="flag-cell">' + flags + '</td><td class="yr">' + entry.year + '</td><td>' + cname(c) + preBadge + '</td><td class="iso">' + c + '</td></tr>';
    }
  }

  var preNote = hasPreNote ? '<div class="note">Pre-1927 assignments were informal and inconsistently recorded.</div>' : '';

  var csDisplay = !cs ? 'Unassigned' : (cs === 'ZZ' ? 'Unavailable' : cname(cs) + ' (' + cs + ')');

  detailPanel.innerHTML =
    '<div class="detail-title">' + prefix + '</div>' +
    '<div class="detail-sub">Currently: <em>' + csDisplay + '</em></div>' +
    '<div class="section-label">Assignment timeline 1906&ndash;2024</div>' +
    legendHTML +
    '<div class="timeline-track" id="tltrack">' + trackHTML + '</div>' +
    '<div class="year-axis">' + axisHTML + '</div>' +
    preNote +
    '<div class="section-label">Change events</div>' +
    '<table class="events-table"><thead><tr><th></th><th>Year</th><th>Assigned to</th><th>Code</th></tr></thead><tbody>' + tableRows + '</tbody></table>';

  var track = document.getElementById('tltrack');
  track.querySelectorAll('.seg').forEach(function(el) {
    el.addEventListener('mousemove', function(ev) {
      var c = el.dataset.c;
      var flags2 = flagsForCode(c);
      var name2 = !c ? 'Unassigned' : (c === 'ZZ' ? 'Unavailable' : cname(c));
      tt.style.display = 'block';
      tt.style.left = (ev.clientX + 14) + 'px';
      tt.style.top = (ev.clientY - 38) + 'px';
      tt.textContent = (flags2 ? flags2 + ' ' : '') + name2 + '  ' + el.dataset.s + '\u2013' + el.dataset.e;
    });
    el.addEventListener('mouseleave', function(){ tt.style.display = 'none'; });
  });
}

function selectCountry(code) {
  selectedCountry = code;
  selectedPrefix = null;
  renderList(searchInput.value);

  var prefixes = (CURRENT[code] || []).slice().sort();
  var flags = flagsForCode(code);
  var name = cname(code);

  var chips = prefixes.map(function(p){ return '<span class="chip" data-p="' + p + '">' + p + '</span>'; }).join('');

  // Historical prefixes
  var hist = [];
  var pfxKeys = Object.keys(PREFIXES);
  for (var i = 0; i < pfxKeys.length; i++) {
    var pfx = pfxKeys[i];
    if (prefixes.indexOf(pfx) >= 0) continue;
    var h = PREFIXES[pfx];
    for (var j = 0; j < h.length; j++) {
      if (h[j].country === code) { hist.push(pfx); break; }
    }
  }
  hist.sort();

  var histSection = hist.length
    ? '<div class="section-label" style="margin-top:18px">Previously held</div><div class="chips">' +
      hist.map(function(p){ return '<span class="chip" data-p="' + p + '">' + p + '</span>'; }).join('') + '</div>'
    : '';

  detailPanel.innerHTML =
    '<div class="country-header">' +
    '<div class="country-flag">' + flags + '</div>' +
    '<div><div class="country-name">' + name + '</div>' +
    '<div class="country-meta">' + code + ' &middot; ' + prefixes.length + ' current prefix' + (prefixes.length !== 1 ? 'es' : '') + '</div></div>' +
    '</div>' +
    '<div class="section-label">Current allocations</div>' +
    '<div class="chips">' + chips + '</div>' +
    histSection;

  detailPanel.querySelectorAll('.chip[data-p]').forEach(function(chip) {
    chip.addEventListener('click', function() {
      mode = 'prefix';
      document.querySelectorAll('.mode-tab').forEach(function(t){ t.classList.toggle('active', t.dataset.mode === 'prefix'); });
      try {
  renderList('');
  console.log('renderList done, items:', document.getElementById('listPanel').children.length);
} catch(err) {
  console.error('renderList error:', err);
  document.getElementById('listPanel').innerHTML = '<div style="color:red;padding:10px;font-size:11px">' + err.message + '</div>';
}
      selectPrefix(chip.dataset.p);
    });
  });
}

searchInput.addEventListener('input', function(){ renderList(searchInput.value); });

document.querySelectorAll('.mode-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    mode = tab.dataset.mode;
    selectedPrefix = null;
    selectedCountry = null;
    document.querySelectorAll('.mode-tab').forEach(function(t){ t.classList.toggle('active', t === tab); });
    searchInput.value = '';
    renderList('');
    detailPanel.innerHTML = '<div class="empty-state">Select a prefix or country<br>to view assignment history</div>';
  });
});

renderList('');
</script>
</body>
</html>
