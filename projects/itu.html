<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITU Callsign Prefix History</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --border: #252d3d;
    --text: #c9d1e0;
    --muted: #5a6478;
    --accent: #4a9eff;
    --accent2: #f0a500;
    --unassigned: #1e2330;
    --pre27: #252030;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }

  header p.sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .controls {
    padding: 16px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 320px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 8px 12px 8px 32px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-wrap .icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 13px;
    pointer-events: none;
  }

  .mode-tabs {
    display: flex;
    gap: 4px;
  }

  .mode-tab {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .mode-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .mode-tab:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── MAIN LAYOUT ── */
  .layout {
    display: flex;
    height: calc(100vh - 137px);
  }

  .list-panel {
    width: 200px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
  }

  .list-panel::-webkit-scrollbar { width: 4px; }
  .list-panel::-webkit-scrollbar-track { background: transparent; }
  .list-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .prefix-item {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid transparent;
    transition: background 0.1s;
    color: var(--text);
  }

  .prefix-item:hover { background: rgba(74,158,255,0.08); }
  .prefix-item.selected { background: rgba(74,158,255,0.15); color: var(--accent); }

  .prefix-item .current-holder {
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
  }

  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    text-align: center;
    line-height: 2;
  }

  /* ── PREFIX DETAIL ── */
  .detail-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .detail-prefix {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .detail-current {
    font-size: 13px;
    color: var(--muted);
  }

  .detail-current span {
    color: var(--accent2);
    font-family: var(--font-mono);
    font-weight: 600;
  }

  /* ── TIMELINE ── */
  .timeline-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .timeline-wrap {
    position: relative;
    margin-bottom: 32px;
  }

  .timeline-track {
    display: flex;
    height: 36px;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .timeline-seg {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    overflow: hidden;
    transition: opacity 0.15s;
    cursor: default;
    position: relative;
  }

  .timeline-seg:hover { opacity: 0.85; }
  .timeline-seg.unassigned { background: var(--unassigned); }
  .timeline-seg.pre27 { background: var(--pre27); }

  .year-axis {
    display: flex;
    position: relative;
    height: 18px;
    margin-top: 3px;
  }

  .year-tick {
    position: absolute;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    transform: translateX(-50%);
    white-space: nowrap;
  }

  /* ── EVENTS TABLE ── */
  .events-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .events-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 12px;
    margin-bottom: 32px;
  }

  .events-table th {
    text-align: left;
    padding: 6px 12px;
    color: var(--muted);
    font-weight: 400;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }

  .events-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .events-table tr:last-child td { border-bottom: none; }
  .events-table tr:hover td { background: rgba(255,255,255,0.02); }

  .flag-cell {
    font-size: 18px;
    line-height: 1;
    width: 36px;
  }

  .year-cell { color: var(--accent2); font-weight: 600; }
  .country-code { color: var(--muted); font-size: 11px; }

  .badge-unassigned {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--unassigned);
    color: var(--muted);
    font-size: 11px;
    border: 1px solid var(--border);
  }

  .badge-pre27 {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--pre27);
    color: var(--muted);
    font-size: 11px;
    border: 1px solid var(--border);
    font-style: italic;
  }

  /* ── COUNTRY MODE ── */
  .country-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    padding: 24px 32px;
  }

  .country-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .country-card:hover {
    border-color: var(--accent);
    background: rgba(74,158,255,0.06);
  }

  .country-card .flag { font-size: 22px; margin-bottom: 6px; }
  .country-card .name {
    font-size: 11px;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .country-card .count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }

  .country-detail-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .country-flag-lg { font-size: 40px; }
  .country-name-lg {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
  }

  .prefix-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 28px;
  }

  .chip {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    cursor: pointer;
    color: var(--text);
    transition: all 0.12s;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(74,158,255,0.08);
  }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed;
    background: #1a2035;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    z-index: 1000;
    white-space: nowrap;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .tooltip .t-flag { font-size: 16px; margin-right: 6px; }
  .tooltip .t-year { color: var(--accent2); font-weight: 600; }

  /* ── ATTRIBUTION ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 12px 32px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  footer a { color: var(--muted); text-decoration: underline; }
  footer a:hover { color: var(--accent); }

  .note-pre27 {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--pre27);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    margin-bottom: 20px;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>ITU Callsign Prefix History</h1>
    <p class="sub">1906 – 2024 · 1,296 prefixes · assignment changes over time</p>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="icon">⌕</span>
    <input type="text" id="search" placeholder="Search prefix or country…" autocomplete="off" spellcheck="false">
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="prefix">By Prefix</button>
    <button class="mode-tab" data-mode="country">By Country</button>
  </div>
</div>

<div class="layout">
  <div class="list-panel" id="listPanel"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="empty-state">Select a prefix or country<br>to view assignment history</div>
  </div>
</div>

<footer>
  <span>Data compiled from <a href="https://dxinfocentre.com/reference/Call_Sign_History.htm" target="_blank" rel="noopener">DX Info Centre – Callsign History</a></span>
  <span>Pre-1927 assignments were informal; shown greyed</span>
</footer>
