<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Lineage of England</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b08;
    --surface: #1a1710;
    --gold: #c9a84c;
    --gold-dim: #8a6f2e;
    --text: #e8dfc8;
    --text-dim: #9a8f78;
    --card-w: 148px;
    --card-h: 102px;
    --gen-gap: 160px;
    --sib-gap: 164px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 14px 24px 12px;
    background: linear-gradient(to bottom, #0d0b08ee, #0d0b0800);
    display: flex;
    align-items: baseline;
    gap: 20px;
    pointer-events: none;
  }

  #header h1 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
  }

  #header p {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }

  #controls {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ctrl-btn {
    width: 36px; height: 36px;
    background: #2a2518;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px;
    transition: background 0.15s;
    font-family: 'Cinzel', serif;
  }
  .ctrl-btn:hover { background: #3a3220; }

  #house-legend {
    position: fixed;
    bottom: 24px; left: 24px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 60vh;
    overflow-y: auto;
  }
  #house-legend::-webkit-scrollbar { width: 4px; }
  #house-legend::-webkit-scrollbar-thumb { background: var(--gold-dim); }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.06em;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.15s;
  }
  .legend-item:hover { opacity: 1; }
  .legend-swatch {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1.5px solid;
    flex-shrink: 0;
  }

  #tooltip {
    position: fixed;
    z-index: 200;
    pointer-events: none;
    background: #1e1b12;
    border: 1px solid var(--gold-dim);
    padding: 12px 16px;
    max-width: 240px;
    opacity: 0;
    transition: opacity 0.12s;
    box-shadow: 0 8px 32px #00000088;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  #tooltip .tt-line {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  #tooltip .tt-house {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    font-style: italic;
  }

  svg { display: block; cursor: grab; }
  svg.dragging { cursor: grabbing; }

  .node-card {
    cursor: pointer;
  }

  .card-rect {
    rx: 3;
    ry: 3;
    filter: drop-shadow(0 2px 6px #00000066);
    transition: filter 0.15s;
  }

  .node-card:hover .card-rect {
    filter: drop-shadow(0 4px 14px #00000099) brightness(1.15);
  }

  .card-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    fill: #f0e8d4;
    pointer-events: none;
  }
  .card-name {
    font-size: 11px;
    font-weight: 600;
    font-family: 'Cinzel', serif;
    fill: #f5edd8;
  }
  .card-sub {
    font-size: 9.5px;
    fill: #c8bfa8;
    font-style: italic;
  }
  .card-dates {
    font-size: 9.5px;
    fill: #b8af98;
  }

  .edge-primary {
    fill: none;
    stroke-width: 1.2;
    opacity: 0.35;
  }
  .edge-secondary {
    fill: none;
    stroke-width: 0.8;
    stroke-dasharray: 4,3;
    opacity: 0.25;
  }

  .node-card.highlighted .card-rect {
    filter: drop-shadow(0 0 12px currentColor) brightness(1.3);
  }
  .node-card.dimmed { opacity: 0.2; }

  .gen-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    fill: #4a4230;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Royal Lineage</h1>
  <p>Alfred the Great to Charles III &mdash; 1,100 years</p>
</div>

<div id="house-legend"></div>

<div id="controls">
  <button class="ctrl-btn" id="btn-in" title="Zoom in">+</button>
  <button class="ctrl-btn" id="btn-out" title="Zoom out">−</button>
  <button class="ctrl-btn" id="btn-fit" title="Fit all" style="font-size:12px">⊞</button>
  <button class="ctrl-btn" id="btn-modern" title="Go to Windsor" style="font-size:10px;letter-spacing:-0.5px">W</button>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-line" id="tt-lines"></div>
  <div class="tt-house" id="tt-house"></div>
</div>

<svg id="canvas"></svg>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const CW = 148, CH = 102, GG = 168, SG = 162;
const PAD = 40;

// ─── Load data ───────────────────────────────────────────────────────────────
fetch('royal.json')
  .then(r => r.json())
  .then(data => init(data))
  .catch(e => {
    document.body.innerHTML = `<div style="color:#c9a84c;padding:40px;font-family:serif">
      <h2>Could not load royal.json</h2>
      <p>Ensure royal.json is in the same directory as this HTML file.</p>
      <pre style="font-size:12px;margin-top:12px;color:#888">${e}</pre>
    </div>`;
  });

function init(data) {
  const nodeMap = {};
  data.nodes.forEach(n => nodeMap[n.id] = n);

  // ─── Compute layout positions ─────────────────────────────────────────────
  // Group children by primary parent, respecting sibling_order
  const primaryChildren = {};
  data.edges.forEach(e => {
    if (e.type === 'primary') {
      if (!primaryChildren[e.from]) primaryChildren[e.from] = [];
      primaryChildren[e.from].push(e.to);
    }
  });
  // Sort by sibling_order
  Object.values(primaryChildren).forEach(arr => {
    arr.sort((a, b) => (nodeMap[a].sibling_order || 0) - (nodeMap[b].sibling_order || 0));
  });

  // Assign x positions via post-order tree layout
  // Use generation as y, compute x by recursive subtree width
  function subtreeWidth(id) {
    const children = primaryChildren[id] || [];
    if (!children.length) return 1;
    return children.reduce((s, c) => s + subtreeWidth(c), 0);
  }

  function assignX(id, left) {
    const n = nodeMap[id];
    const children = primaryChildren[id] || [];
    if (!children.length) {
      n._x = left + 0.5;
      return left + 1;
    }
    let cursor = left;
    let minX = Infinity, maxX = -Infinity;
    children.forEach(cid => {
      cursor = assignX(cid, cursor);
      minX = Math.min(minX, nodeMap[cid]._x);
      maxX = Math.max(maxX, nodeMap[cid]._x);
    });
    n._x = (minX + maxX) / 2;
    return cursor;
  }

  // Find root (Alfred)
  const rootId = '!!_Alf';
  assignX(rootId, 0);

  // Convert to pixel coords
  // Y: generation * GG, but invert so oldest is top (generation 1 = top)
  const maxGen = Math.max(...data.nodes.map(n => n.generation || 1));
  data.nodes.forEach(n => {
    n.px = n._x * SG;
    n.py = ((n.generation || 1) - 1) * GG;
  });

  // ─── Canvas bounds ────────────────────────────────────────────────────────
  const allX = data.nodes.map(n => n.px);
  const allY = data.nodes.map(n => n.py);
  const minX = Math.min(...allX) - PAD;
  const maxX = Math.max(...allX) + CW + PAD;
  const minY = Math.min(...allY) - PAD;
  const maxY = Math.max(...allY) + CH + PAD;
  const totalW = maxX - minX;
  const totalH = maxY - minY;

  // ─── SVG setup ────────────────────────────────────────────────────────────
  const svg = d3.select('#canvas')
    .attr('width', window.innerWidth)
    .attr('height', window.innerHeight);

  const zoom = d3.zoom()
    .scaleExtent([0.03, 2.5])
    .on('zoom', e => {
      g.attr('transform', e.transform);
      svg.classed('dragging', e.sourceEvent && e.sourceEvent.type === 'mousemove');
    })
    .on('end', () => svg.classed('dragging', false));

  svg.call(zoom);

  const g = svg.append('g');

  // Generation stripe backgrounds
  const stripes = g.append('g').attr('class', 'stripes');
  // Subtle alternating bands
  const HOUSE_ERAS = [
    { name: 'Wessex', gen: [1, 9] },
    { name: 'Knýtlinga & Godwin', gen: [10, 14] },
    { name: 'Normandy & Blois', gen: [15, 20] },
    { name: 'Anjou & Plantagenet', gen: [21, 28] },
    { name: 'Lancaster & York', gen: [29, 33] },
    { name: 'Tudor', gen: [34, 37] },
    { name: 'Stuart & Interregnum', gen: [38, 38] },
    { name: 'Restoration onward', gen: [39, 42] },
  ];

  HOUSE_ERAS.forEach((era, i) => {
    const y1 = (era.gen[0] - 1) * GG - GG * 0.45;
    const y2 = era.gen[1] * GG + GG * 0.45;
    stripes.append('rect')
      .attr('x', minX).attr('y', y1)
      .attr('width', totalW).attr('height', y2 - y1)
      .attr('fill', i % 2 === 0 ? '#ffffff04' : '#ffffff00');
    stripes.append('text')
      .attr('class', 'gen-label')
      .attr('x', minX + 8)
      .attr('y', y1 + 14)
      .text(era.name);
  });

  // ─── Edges ────────────────────────────────────────────────────────────────
  const edgeG = g.append('g').attr('class', 'edges');

  data.edges.forEach(e => {
    const p = nodeMap[e.from], c = nodeMap[e.to];
    if (!p || !c) return;
    const x1 = p.px + CW / 2, y1 = p.py + CH;
    const x2 = c.px + CW / 2, y2 = c.py;
    const my = (y1 + y2) / 2;

    const col = (p.colours && p.colours.member) || '#888';
    edgeG.append('path')
      .attr('class', e.type === 'primary' ? 'edge-primary' : 'edge-secondary')
      .attr('stroke', col)
      .attr('d', `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
  });

  // ─── Nodes ────────────────────────────────────────────────────────────────
  const nodeG = g.append('g').attr('class', 'nodes');

  const nodeEls = nodeG.selectAll('.node-card')
    .data(data.nodes)
    .join('g')
    .attr('class', 'node-card')
    .attr('transform', d => `translate(${d.px},${d.py})`);

  // Card background
  nodeEls.append('rect')
    .attr('class', 'card-rect')
    .attr('width', CW).attr('height', CH)
    .attr('fill', d => cardFill(d))
    .attr('stroke', d => (d.colours && d.colours.border) || '#555')
    .attr('stroke-width', 1.5);

  // Sovereign top accent bar
  nodeEls.filter(d => d.is_sovereign)
    .append('rect')
    .attr('width', CW).attr('height', 3)
    .attr('fill', d => (d.colours && d.colours.border) || '#888')
    .attr('opacity', 0.9);

  // Card content
  nodeEls.each(function(d) {
    const el = d3.select(this);
    const lines = cardLines(d);
    const lineH = 13;
    const totalH_lines = lines.length * lineH;
    const startY = (CH - totalH_lines) / 2 + 6;

    lines.forEach((line, i) => {
      el.append('text')
        .attr('class', `card-text ${line.cls}`)
        .attr('x', CW / 2)
        .attr('y', startY + i * lineH)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'hanging')
        .text(line.text);
    });
  });

  // ─── Tooltip ─────────────────────────────────────────────────────────────
  const tooltip = document.getElementById('tooltip');
  const ttName  = document.getElementById('tt-name');
  const ttLines = document.getElementById('tt-lines');
  const ttHouse = document.getElementById('tt-house');

  nodeEls
    .on('mousemove', function(event, d) {
      ttName.textContent = d.name;
      const lines = [];
      if (d.sobriquet) lines.push(`"${d.sobriquet}"`);
      if (d.designation) lines.push(d.designation);
      if (d.is_sovereign && d.birth_line) lines.push(d.birth_line);
      if (d.dates) lines.push(`Reign: ${d.dates}`);
      if (d.post_reign_death) lines.push(d.post_reign_death);
      if (!d.is_sovereign && d.birth_line) lines.push(d.birth_line);
      if (d.marriage) lines.push(`m. ${d.marriage}`);
      if (d.excl_yr) lines.push(`Excluded ${d.excl_yr}`);
      ttLines.innerHTML = lines.map(l => `<div>${l}</div>`).join('');
      ttHouse.textContent = `House of ${d.house}`;
      tooltip.classList.add('visible');
      positionTooltip(event);
    })
    .on('mousemove.pos', function(event) { positionTooltip(event); })
    .on('mouseleave', () => tooltip.classList.remove('visible'))
    .on('click', function(event, d) {
      event.stopPropagation();
      highlightFamily(d, nodeEls, data.edges, nodeMap);
    });

  svg.on('click', () => clearHighlight(nodeEls));

  function positionTooltip(event) {
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    let tx = event.clientX + 14, ty = event.clientY - th / 2;
    if (tx + tw > window.innerWidth - 10) tx = event.clientX - tw - 14;
    if (ty < 10) ty = 10;
    if (ty + th > window.innerHeight - 10) ty = window.innerHeight - th - 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
  }

  // ─── Legend ───────────────────────────────────────────────────────────────
  const legendEl = document.getElementById('house-legend');
  Object.entries(data.house_colours).forEach(([name, c]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-swatch" style="background:${c.member};border-color:${c.border}"></div>
      <span>${name}</span>`;
    item.addEventListener('click', () => filterByHouse(name, nodeEls));
    legendEl.appendChild(item);
  });

  // ─── Controls ─────────────────────────────────────────────────────────────
  document.getElementById('btn-in').addEventListener('click', () => {
    svg.transition().duration(300).call(zoom.scaleBy, 1.5);
  });
  document.getElementById('btn-out').addEventListener('click', () => {
    svg.transition().duration(300).call(zoom.scaleBy, 0.67);
  });
  document.getElementById('btn-fit').addEventListener('click', () => fitAll());
  document.getElementById('btn-modern').addEventListener('click', () => goToWindsor());

  function fitAll() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.min(vw / totalW, vh / totalH) * 0.9;
    const tx = (vw - totalW * scale) / 2 - minX * scale;
    const ty = (vh - totalH * scale) / 2 - minY * scale;
    svg.transition().duration(600)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  function goToWindsor() {
    // Centre on Windsor nodes
    const windsor = data.nodes.filter(n => n.house === 'Windsor');
    const wxs = windsor.map(n => n.px), wys = windsor.map(n => n.py);
    const cx = (Math.min(...wxs) + Math.max(...wxs)) / 2 + CW / 2;
    const cy = (Math.min(...wys) + Math.max(...wys)) / 2 + CH / 2;
    const scale = 1.2;
    const vw = window.innerWidth, vh = window.innerHeight;
    svg.transition().duration(800)
      .call(zoom.transform, d3.zoomIdentity
        .translate(vw / 2 - cx * scale, vh / 2 - cy * scale)
        .scale(scale));
  }

  // Start on Windsor
  setTimeout(goToWindsor, 100);

  // Window resize
  window.addEventListener('resize', () => {
    svg.attr('width', window.innerWidth).attr('height', window.innerHeight);
  });
}

// ─── Card helpers ─────────────────────────────────────────────────────────────
function cardFill(d) {
  const c = d.colours;
  if (!c || !c.member) return '#2a2518';
  if (d.state === 'reigning') return c.reigning;
  if (d.state === 'excluded') return c.excluded;
  return c.member;
}

function cardLines(d) {
  const lines = [];

  // Name (always)
  lines.push({ text: truncate(d.name, 20), cls: 'card-name' });

  if (d.is_sovereign) {
    if (d.sobriquet) lines.push({ text: truncate(d.sobriquet, 22), cls: 'card-sub' });
    if (d.birth_line) lines.push({ text: d.birth_line, cls: 'card-dates' });
    if (d.dates)      lines.push({ text: d.dates, cls: 'card-dates' });
    if (d.post_reign_death) lines.push({ text: d.post_reign_death, cls: 'card-dates' });
  } else if (d.gender === 'F') {
    if (d.sobriquet) lines.push({ text: truncate(d.sobriquet, 22), cls: 'card-sub' });
    if (d.birth_line) lines.push({ text: d.birth_line, cls: 'card-dates' });
    if (d.marriage)  lines.push({ text: truncate('m. ' + d.marriage, 22), cls: 'card-sub' });
  } else {
    if (d.sobriquet)    lines.push({ text: truncate(d.sobriquet, 22), cls: 'card-sub' });
    if (d.designation) lines.push({ text: truncate(d.designation, 22), cls: 'card-sub' });
    if (d.birth_line)  lines.push({ text: d.birth_line, cls: 'card-dates' });
  }

  return lines.slice(0, 5);
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len - 1) + '…' : str;
}

// ─── Highlight family on click ────────────────────────────────────────────────
function highlightFamily(d, nodeEls, edges, nodeMap) {
  const related = new Set([d.id]);
  edges.forEach(e => {
    if (e.from === d.id) related.add(e.to);
    if (e.to === d.id)   related.add(e.from);
  });
  nodeEls
    .classed('highlighted', n => n.id === d.id)
    .classed('dimmed', n => !related.has(n.id));
}

function clearHighlight(nodeEls) {
  nodeEls.classed('highlighted', false).classed('dimmed', false);
}

function filterByHouse(house, nodeEls) {
  const anyDimmed = nodeEls.filter('.dimmed').size() > 0;
  if (!anyDimmed) {
    nodeEls.classed('dimmed', n => n.house !== house);
  } else {
    clearHighlight(nodeEls);
  }
}
</script>
</body>
</html>
