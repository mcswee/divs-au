<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Lineage of England</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b08;
    --gold: #c9a84c;
    --gold-dim: #8a6f2e;
    --text: #e8dfc8;
    --text-dim: #9a8f78;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
  }
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 14px 24px 12px;
    background: linear-gradient(to bottom, #0d0b08ee, transparent);
    display: flex; align-items: baseline; gap: 20px;
    pointer-events: none;
  }
  #header h1 {
    font-family: 'Cinzel', serif; font-size: 18px; font-weight: 600;
    letter-spacing: 0.12em; color: var(--gold); text-transform: uppercase;
  }
  #header p { font-size: 13px; color: var(--text-dim); font-style: italic; }

  #controls {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 8px;
  }
  .ctrl-btn {
    width: 36px; height: 36px; background: #2a2518;
    border: 1px solid var(--gold-dim); color: var(--gold);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px; transition: background 0.15s;
    font-family: 'Cinzel', serif;
  }
  .ctrl-btn:hover { background: #3a3220; }

  #house-legend {
    position: fixed; bottom: 24px; left: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 4px;
    max-height: 55vh; overflow-y: auto;
  }
  #house-legend::-webkit-scrollbar { width: 4px; }
  #house-legend::-webkit-scrollbar-thumb { background: var(--gold-dim); }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 11px; color: var(--text-dim);
    font-family: 'Cinzel', serif; letter-spacing: 0.06em;
    cursor: pointer; opacity: 0.85; transition: opacity 0.15s;
  }
  .legend-item:hover { opacity: 1; }
  .legend-swatch {
    width: 10px; height: 10px; border-radius: 2px;
    border: 1.5px solid; flex-shrink: 0;
  }

  #tooltip {
    position: fixed; z-index: 200; pointer-events: none;
    background: #1e1b12; border: 1px solid var(--gold-dim);
    padding: 12px 16px; max-width: 260px;
    opacity: 0; transition: opacity 0.12s;
    box-shadow: 0 8px 32px #00000088;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); margin-bottom: 5px; }
  #tooltip .tt-line { font-size: 12px; color: var(--text-dim); line-height: 1.75; }
  #tooltip .tt-house { font-size: 11px; color: var(--text-dim); margin-top: 7px; font-style: italic; }

  svg { display: block; }
  #canvas { cursor: grab; }
  #canvas.dragging { cursor: grabbing; }

  .card-rect { transition: filter 0.15s; }
  .node-card:hover .card-rect { filter: brightness(1.2) drop-shadow(0 4px 10px #00000099); }
  .node-card.dimmed { opacity: 0.15; }
  .edge-primary   { fill: none; stroke-width: 1.2; opacity: 0.3; }
  .edge-secondary { fill: none; stroke-width: 0.8; stroke-dasharray: 4,3; opacity: 0.22; }
  .era-label { font-family: 'Cinzel', serif; font-size: 10px; fill: #3a3220; letter-spacing: 0.08em; }
</style>
</head>
<body>

<div id="header">
  <h1>Royal Lineage</h1>
  <p>Alfred the Great to Charles III &mdash; 1,100 years</p>
</div>

<div id="house-legend"></div>

<div id="controls">
  <button class="ctrl-btn" id="btn-in">+</button>
  <button class="ctrl-btn" id="btn-out">−</button>
  <button class="ctrl-btn" id="btn-fit" style="font-size:12px" title="Fit all">⊞</button>
  <button class="ctrl-btn" id="btn-modern" style="font-size:11px;letter-spacing:-0.5px" title="Go to Windsor">W</button>
</div>

<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-line" id="tt-lines"></div>
  <div class="tt-house" id="tt-house"></div>
</div>

<svg id="canvas"></svg>

<script>
const CW = 148, CH = 98, GG = 156, SG = 158;

// YIQ contrast: returns '#000' or '#fff' for best readability
function yiqText(hex) {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  return ((r*299 + g*587 + b*114)/1000) >= 128 ? '#111111' : '#f5edd8';
}

fetch('/assets/data/royal.json')
  .then(r => r.json())
  .then(init)
  .catch(e => {
    document.body.innerHTML = `<div style="color:#c9a84c;padding:40px;font-family:Georgia,serif">
      <h2>Could not load royal.json</h2>
      <p>Serve both files from the same web server (e.g. <code>python3 -m http.server 8000</code>).</p>
      <pre style="font-size:11px;margin-top:12px;color:#888">${e}</pre></div>`;
  });

function init(data) {
  const nodeMap = {};
  data.nodes.forEach(n => { nodeMap[n.id] = n; });

  // ── 1. Build primary children map, sorted by sibling_order ──────────────
  const primaryChildren = {};
  data.edges.forEach(e => {
    if (e.type !== 'primary') return;
    if (!primaryChildren[e.from]) primaryChildren[e.from] = [];
    primaryChildren[e.from].push(e.to);
  });
  Object.values(primaryChildren).forEach(arr =>
    arr.sort((a,b) => (nodeMap[a].sibling_order||0) - (nodeMap[b].sibling_order||0))
  );

  // ── 2. Assign x positions via recursive subtree layout ──────────────────
  // Returns the next available x slot after placing this subtree.
  // Stores result in node.layoutX (unit columns, converted to px later).
  function place(id, cursor) {
    const children = primaryChildren[id] || [];
    if (!children.length) {
      nodeMap[id].layoutX = cursor + 0.5;
      return cursor + 1;
    }
    let start = cursor;
    children.forEach(cid => { cursor = place(cid, cursor); });
    // Centre parent over its children
    const firstX = nodeMap[children[0]].layoutX;
    const lastX  = nodeMap[children[children.length-1]].layoutX;
    nodeMap[id].layoutX = (firstX + lastX) / 2;
    return cursor;
  }
  place('!!_Alf', 0);

  // Handle any nodes not reached from Alfred (isolated or secondary-only)
  let maxX = Math.max(...data.nodes.map(n => n.layoutX || 0)) + 2;
  data.nodes.forEach(n => {
    if (n.layoutX === undefined) { n.layoutX = maxX; maxX += 1; }
  });

  // Convert to pixel coords
  data.nodes.forEach(n => {
    n.px = n.layoutX * SG;
    n.py = ((n.generation || 1) - 1) * GG;
  });

  const allX = data.nodes.map(n => n.px);
  const allY = data.nodes.map(n => n.py);
  const minX = Math.min(...allX) - 60;
  const maxXpx = Math.max(...allX) + CW + 60;
  const minY = Math.min(...allY) - 60;
  const maxYpx = Math.max(...allY) + CH + 60;

  // ── 3. SVG + zoom ────────────────────────────────────────────────────────
  const svg = d3.select('#canvas')
    .attr('width', window.innerWidth)
    .attr('height', window.innerHeight);

  const g = svg.append('g').attr('class', 'root');

  const zoom = d3.zoom()
    .scaleExtent([0.02, 3])
    .on('start', () => svg.classed('dragging', true))
    .on('zoom',  e  => g.attr('transform', e.transform))
    .on('end',   () => svg.classed('dragging', false));

  svg.call(zoom).on('dblclick.zoom', null);

  // ── 4. Era stripe labels ──────────────────────────────────────────────────
  const ERAS = [
    ['Wessex', 1, 9], ['Knýtlinga & Godwin', 10, 14],
    ['Normandy & Blois', 15, 20], ['Anjou & Plantagenet', 21, 28],
    ['Lancaster & York', 29, 33], ['Tudor', 34, 37],
    ['Stuart & Interregnum', 38, 39], ['Orange-Nassau to Windsor', 40, 42],
  ];
  const stripG = g.append('g');
  ERAS.forEach(([label, g1, g2], i) => {
    const y1 = (g1 - 1) * GG - GG * 0.45;
    const y2 = g2 * GG + GG * 0.45;
    stripG.append('rect')
      .attr('x', minX).attr('width', maxXpx - minX)
      .attr('y', y1).attr('height', y2 - y1)
      .attr('fill', i % 2 === 0 ? '#ffffff03' : 'none');
    stripG.append('text').attr('class', 'era-label')
      .attr('x', minX + 10).attr('y', y1 + 15)
      .text(label);
  });

  // ── 5. Edges ──────────────────────────────────────────────────────────────
  const edgeG = g.append('g');
  data.edges.forEach(e => {
    const p = nodeMap[e.from], c = nodeMap[e.to];
    if (!p || !c || p.px == null || c.px == null) return;
    const x1 = p.px + CW/2, y1 = p.py + CH;
    const x2 = c.px + CW/2, y2 = c.py;
    const my = (y1 + y2) / 2;
    const col = (p.colours && p.colours.border) || '#666';
    edgeG.append('path')
      .attr('class', e.type === 'primary' ? 'edge-primary' : 'edge-secondary')
      .attr('stroke', col)
      .attr('d', `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
  });

  // ── 6. Node cards ──────────────────────────────────────────────────────────
  const nodeG = g.append('g');
  const nodeEls = nodeG.selectAll('g.node-card')
    .data(data.nodes)
    .join('g')
    .attr('class', 'node-card')
    .attr('transform', d => `translate(${d.px},${d.py})`)
    .style('cursor', 'pointer');

  // Background rect
  nodeEls.append('rect')
    .attr('class', 'card-rect')
    .attr('width', CW).attr('height', CH).attr('rx', 3).attr('ry', 3)
    .attr('fill',   d => cardBg(d))
    .attr('stroke', d => (d.colours && d.colours.border) || '#555')
    .attr('stroke-width', 1.5)
    .style('filter', 'drop-shadow(0 2px 5px #00000055)');

  // Sovereign accent bar
  nodeEls.filter(d => d.is_sovereign)
    .append('rect')
    .attr('width', CW).attr('height', 3).attr('rx', 3)
    .attr('fill', d => (d.colours && d.colours.border) || '#888');

  // Text lines
  nodeEls.each(function(d) {
    const el   = d3.select(this);
    const bg   = cardBg(d);
    const fill = yiqText(bg);
    const fillDim = fill === '#111111' ? '#333333' : '#c8bfa8';
    const lines = buildLines(d);
    const lineH = 13.5;
    const totalH = lines.length * lineH;
    let y = (CH - totalH) / 2 + (d.is_sovereign ? 4 : 2);

    lines.forEach(line => {
      el.append('text')
        .attr('x', CW / 2)
        .attr('y', y)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'hanging')
        .attr('font-family', line.cinzel ? "'Cinzel', serif" : "'Cormorant Garamond', Georgia, serif")
        .attr('font-size',   line.size || 10)
        .attr('font-weight', line.bold ? 600 : 400)
        .attr('font-style',  line.italic ? 'italic' : 'normal')
        .attr('fill', line.dim ? fillDim : fill)
        .text(line.text);
      y += lineH;
    });
  });

  // ── 7. Tooltip ────────────────────────────────────────────────────────────
  const tooltip  = document.getElementById('tooltip');
  const ttName   = document.getElementById('tt-name');
  const ttLines  = document.getElementById('tt-lines');
  const ttHouse  = document.getElementById('tt-house');

  nodeEls
    .on('mouseenter', function(event, d) {
      const rows = [];
      if (d.sobriquet)  rows.push(`"${d.sobriquet}"`);
      if (d.designation) rows.push(d.designation);
      if (d.is_sovereign && d.birth_line) rows.push(d.birth_line);
      if (d.dates)       rows.push(`Reign: ${d.dates}`);
      if (d.post_reign_death) rows.push(d.post_reign_death);
      if (!d.is_sovereign && d.birth_line) rows.push(d.birth_line);
      if (d.marriage)    rows.push(`m. ${d.marriage}`);
      if (d.excl_yr)     rows.push(`Excluded ${d.excl_yr}`);
      ttName.textContent  = d.name;
      ttLines.innerHTML   = rows.map(r => `<div>${r}</div>`).join('');
      ttHouse.textContent = `House of ${d.house}`;
      tooltip.classList.add('visible');
    })
    .on('mousemove', function(event) { positionTip(event); })
    .on('mouseleave', () => tooltip.classList.remove('visible'))
    .on('click', function(event, d) {
      event.stopPropagation();
      highlightFamily(d);
    });

  svg.on('click', clearHighlight);

  function positionTip(event) {
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    let tx = event.clientX + 16, ty = event.clientY - th / 2;
    if (tx + tw > window.innerWidth - 8) tx = event.clientX - tw - 16;
    ty = Math.max(8, Math.min(ty, window.innerHeight - th - 8));
    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
  }

  function highlightFamily(d) {
    const related = new Set([d.id]);
    data.edges.forEach(e => {
      if (e.from === d.id) related.add(e.to);
      if (e.to   === d.id) related.add(e.from);
    });
    nodeEls.classed('dimmed', n => !related.has(n.id));
  }

  function clearHighlight() {
    nodeEls.classed('dimmed', false);
  }

  // ── 8. Legend ─────────────────────────────────────────────────────────────
  const legendEl = document.getElementById('house-legend');
  let legendFiltered = null;
  Object.entries(data.house_colours).forEach(([name, c]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background:${c.member};border-color:${c.border}"></div><span>${name}</span>`;
    item.addEventListener('click', () => {
      if (legendFiltered === name) {
        clearHighlight();
        legendFiltered = null;
      } else {
        nodeEls.classed('dimmed', n => n.house !== name);
        legendFiltered = name;
      }
    });
    legendEl.appendChild(item);
  });

  // ── 9. Control buttons ────────────────────────────────────────────────────
  function zoomBy(factor) {
    svg.transition().duration(300).call(zoom.scaleBy, factor);
  }

  function zoomTo(transform) {
    svg.transition().duration(700).call(zoom.transform, transform);
  }

  function fitAll() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const tw = maxXpx - minX, th = maxYpx - minY;
    const scale = Math.min(vw / tw, vh / th) * 0.88;
    const tx = (vw - tw * scale) / 2 - minX * scale;
    const ty = (vh - th * scale) / 2 - minY * scale;
    zoomTo(d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  function goToWindsor() {
    const ws = data.nodes.filter(n => n.house === 'Windsor');
    if (!ws.length) return;
    const wxs = ws.map(n => n.px), wys = ws.map(n => n.py);
    const cx = (Math.min(...wxs) + Math.max(...wxs)) / 2 + CW / 2;
    const cy = (Math.min(...wys) + Math.max(...wys)) / 2 + CH / 2;
    const scale = 1.1;
    const vw = window.innerWidth, vh = window.innerHeight;
    zoomTo(d3.zoomIdentity
      .translate(vw / 2 - cx * scale, vh / 2 - cy * scale)
      .scale(scale));
  }

  document.getElementById('btn-in').addEventListener('click', () => zoomBy(1.5));
  document.getElementById('btn-out').addEventListener('click', () => zoomBy(0.67));
  document.getElementById('btn-fit').addEventListener('click', fitAll);
  document.getElementById('btn-modern').addEventListener('click', goToWindsor);

  window.addEventListener('resize', () => {
    svg.attr('width', window.innerWidth).attr('height', window.innerHeight);
  });

  // Start on Windsor
  setTimeout(goToWindsor, 150);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function cardBg(d) {
  const c = d.colours;
  if (!c || !c.member) return '#2a2518';
  if (d.state === 'excluded') return c.excluded;
  if (d.state === 'reigning') return c.reigning;
  return c.member;
}

function trunc(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n-1) + '…' : s;
}

function buildLines(d) {
  const lines = [];
  if (d.is_sovereign) {
    lines.push({ text: trunc(d.name, 20), cinzel: true, size: 10.5, bold: true });
    if (d.sobriquet)  lines.push({ text: trunc(d.sobriquet, 24), italic: true, size: 9.5, dim: true });
    if (d.birth_line) lines.push({ text: d.birth_line, size: 9.5, dim: true });
    if (d.dates)      lines.push({ text: d.dates, size: 9.5, dim: true });
    if (d.post_reign_death) lines.push({ text: d.post_reign_death, size: 9.5, dim: true });
  } else if (d.gender === 'F') {
    lines.push({ text: trunc(d.name, 22), cinzel: true, size: 10, bold: true });
    if (d.sobriquet)  lines.push({ text: trunc(d.sobriquet, 24), italic: true, size: 9.5, dim: true });
    if (d.birth_line) lines.push({ text: d.birth_line, size: 9.5, dim: true });
    if (d.marriage)   lines.push({ text: trunc('m. '+d.marriage, 24), italic: true, size: 9, dim: true });
  } else {
    lines.push({ text: trunc(d.name, 22), cinzel: true, size: 10, bold: true });
    if (d.sobriquet)    lines.push({ text: trunc(d.sobriquet, 24), italic: true, size: 9.5, dim: true });
    if (d.designation) lines.push({ text: trunc(d.designation, 24), size: 9, dim: true });
    if (d.birth_line)  lines.push({ text: d.birth_line, size: 9.5, dim: true });
  }
  return lines.slice(0, 5);
}
</script>
</body>
</html>
