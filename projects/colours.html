<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colours — A Historical Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ec;
    --surface: #ede9e0;
    --ink: #1a1714;
    --ink-faint: #6b6660;
    --ink-muted: #9a948e;
    --rule: #d8d2c8;
    --modal-bg: rgba(26, 23, 20, 0.55);
    --radius: 4px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-display);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── Header ── */
  header {
    padding: 56px 48px 36px;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }

  header h1 {
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.08em;
    line-height: 1;
    margin-bottom: 10px;
  }

  header p {
    font-size: 1rem;
    font-weight: 300;
    color: var(--ink-faint);
    font-style: italic;
    letter-spacing: 0.02em;
  }

  header .count-badge {
    position: absolute;
    top: 56px;
    right: 48px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Controls ── */
  .controls {
    padding: 28px 48px 24px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 0 0 280px;
  }

  .search-wrap input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input::placeholder { color: var(--ink-muted); }
  .search-wrap input:focus { border-color: var(--ink-faint); }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
    pointer-events: none;
  }

  .sort-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sort-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
  }

  .sort-wrap select {
    padding: 7px 10px;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--ink);
    cursor: pointer;
    outline: none;
  }

  .sort-wrap select:focus { border-color: var(--ink-faint); }

  /* ── Family filters ── */
  .family-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .family-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    margin-right: 4px;
  }

  .family-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px 5px 8px;
    border: 1px solid var(--rule);
    border-radius: 20px;
    background: var(--surface);
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--ink);
    transition: all 0.15s;
    user-select: none;
  }

  .family-btn:hover { border-color: var(--ink-muted); }

  .family-btn.active {
    border-color: var(--ink);
    background: var(--ink);
    color: var(--bg);
  }

  .family-btn .swatch-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.12);
  }

  .family-btn.active .swatch-dot {
    border-color: rgba(255,255,255,0.2);
  }

  .family-all {
    padding: 5px 14px;
    border: 1px solid var(--rule);
    border-radius: 20px;
    background: transparent;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
    transition: all 0.15s;
    user-select: none;
  }

  .family-all:hover { border-color: var(--ink-muted); }
  .family-all.active { border-color: var(--ink); color: var(--ink); font-weight: 400; }

  /* ── Results bar ── */
  .results-bar {
    padding: 12px 48px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--rule);
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px;
    background: var(--rule);
    border-top: none;
  }

  .swatch-card {
    background: var(--bg);
    cursor: pointer;
    transition: transform 0.12s, z-index 0s;
    position: relative;
    overflow: hidden;
  }

  .swatch-card:hover { transform: scale(1.04); z-index: 10; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }

  .swatch-color {
    height: 120px;
    width: 100%;
    position: relative;
  }

  .swatch-copy-hint {
    position: absolute;
    bottom: 8px;
    right: 8px;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    padding: 3px 7px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }

  .swatch-card:hover .swatch-copy-hint { opacity: 1; }

  .swatch-info {
    padding: 10px 12px 12px;
    border-top: 1px solid var(--rule);
  }

  .swatch-name {
    font-size: 0.92rem;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .swatch-hex {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
  }

  .swatch-year-mini {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--ink-muted);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--modal-bg);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(3px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    width: 100%;
    max-width: 520px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    animation: modal-in 0.2s ease;
  }

  @keyframes modal-in {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-swatch {
    height: 180px;
    width: 100%;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 16px;
  }

  .modal-hex-badge {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border-radius: 3px;
    backdrop-filter: blur(8px);
  }

  .modal-body {
    padding: 24px 28px 28px;
  }

  .modal-name {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 6px;
  }

  .modal-family-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 14px;
  }

  .modal-year {
    font-size: 0.92rem;
    font-style: italic;
    color: var(--ink-faint);
    margin-bottom: 20px;
    line-height: 1.5;
    font-weight: 300;
  }

  .modal-divider {
    height: 1px;
    background: var(--rule);
    margin: 18px 0;
  }

  .modal-data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px 8px;
    margin-bottom: 20px;
  }

  .data-cell { }

  .data-cell .label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    margin-bottom: 3px;
  }

  .data-cell .value {
    font-family: var(--font-mono);
    font-size: 0.82rem;
    color: var(--ink);
  }

  /* Contrast indicators */
  .contrast-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .contrast-chip {
    flex: 1;
    padding: 10px 12px;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    gap: 4px;
    border: 1px solid var(--rule);
  }

  .contrast-chip .chip-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }

  .contrast-chip .chip-ratio {
    font-family: var(--font-mono);
    font-size: 1rem;
    font-weight: 400;
  }

  .contrast-chip .chip-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .wcag-badge {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    padding: 2px 5px;
    border-radius: 2px;
    letter-spacing: 0.04em;
  }

  .wcag-pass { background: #2d6a3f; color: #fff; }
  .wcag-fail { background: #8a2e2e; color: #fff; }
  .wcag-aa   { }
  .wcag-aaa  { }

  /* Legibility preview */
  .legibility-preview {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .preview-block {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius);
    font-family: var(--font-display);
    font-size: 0.88rem;
    line-height: 1.4;
  }

  /* Actions */
  .modal-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--rule);
    background: var(--surface);
    color: var(--ink);
  }

  .btn:hover { border-color: var(--ink-faint); background: var(--bg); }
  .btn.btn-primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn.btn-primary:hover { opacity: 0.85; }

  .btn.copied { background: #2d6a3f; color: #fff; border-color: #2d6a3f; }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.15);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.9);
    font-size: 1rem;
    transition: background 0.15s;
    backdrop-filter: blur(4px);
  }

  .modal-close:hover { background: rgba(0,0,0,0.3); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--ink);
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Empty state */
  .empty-state {
    padding: 80px 48px;
    text-align: center;
    color: var(--ink-muted);
    font-style: italic;
    font-size: 1.1rem;
    display: none;
  }

  /* Responsive */
  @media (max-width: 600px) {
    header, .controls, .results-bar { padding-left: 20px; padding-right: 20px; }
    header .count-badge { right: 20px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .modal-data-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Colours</h1>
  <p>A historical reference — names, origins, and values</p>
  <span class="count-badge" id="totalCount"></span>
</header>

<div class="controls">
  <div class="controls-row">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>

    </div>
    <div class="sort-wrap">

        <option value="name">Name (A–Z)</option>

        <option value="year-desc">Year (newest first)</option>
        <option value="hue">Hue</option>
        <option value="lum">Luminosity (light–dark)</option>
        <option value="lum-desc">Luminosity (dark–light)</option>
        <option value="sat">Saturation</option>

    </div>
  </div>

  <div class="family-filters" id="familyFilters">
    <span class="family-label">Family</span>
    <button class="family-all active" data-family="all">All</button>
  </div>
</div>

<div class="results-bar" id="resultsBar"></div>

<div class="grid" id="grid"></div>
<div class="empty-state" id="emptyState">No colours match your search.</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-swatch" id="modalSwatch">
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      <span class="modal-hex-badge" id="modalHexBadge"></span>
    </div>
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-family-tag" id="modalFamilyTag"></div>
      <div class="modal-year" id="modalYear"></div>
      <div class="contrast-row" id="contrastRow"></div>
      <div class="legibility-preview" id="legibilityPreview"></div>
      <div class="modal-divider"></div>
      <div class="modal-data-grid" id="modalDataGrid"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── Family definitions ────────────────────────────────────────────────────────
const FAMILIES = {
  R: { name: 'Red',            rep: '#c41e3a' },
  O: { name: 'Orange',         rep: '#ff7538' },
  Y: { name: 'Yellow',         rep: '#fedf00' },
  G: { name: 'Green',          rep: '#228b22' },
  T: { name: 'Teal & Cyan',    rep: '#069494' },
  B: { name: 'Blue',           rep: '#305cde' },
  V: { name: 'Violet & Purple',rep: '#7f00ff' },
  P: { name: 'Pink & Rose',    rep: '#ff8bc5' },
  N: { name: 'Neutral & Brown',rep: '#895129' },
  W: { name: 'White & Cream',  rep: '#f2f0e6' },
  K: { name: 'Black & Grey',   rep: '#898989' },
};

// ── Parse CSV ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = vals[i]?.trim() ?? '');
    return obj;
  });
}

// ── Year formatting ───────────────────────────────────────────────────────────
function formatYear(raw) {
  const y = raw.trim();
  if (y === 'imm.') return 'Known as a colour name since ancient times.';
  if (y.startsWith('c.')) {
    const yr = y.replace('c.', '').trim();
    return `First used as a name for a colour around ${yr}.`;
  }
  return `First used as a name for a colour in ${y}.`;
}

function yearForSort(raw) {
  const y = raw.trim();
  if (y === 'imm.') return -9999;
  return parseInt(y.replace('c.', '').replace('.', '')) || 9999;
}

// ── WCAG labels ───────────────────────────────────────────────────────────────
function wcagBadges(ratio) {
  const r = parseFloat(ratio);
  const badges = [];
  if (r >= 3)   badges.push({ label: 'AA Large', pass: true });
  if (r >= 4.5) badges.push({ label: 'AA', pass: true });
  else          badges.push({ label: 'AA', pass: false });
  if (r >= 7)   badges.push({ label: 'AAA', pass: true });
  else          badges.push({ label: 'AAA', pass: false });
  return badges;
}

// ── Perceived text colour (for swatch labels) ─────────────────────────────────
function textColour(yiq) {
  return parseInt(yiq) >= 128 ? '#1a1714' : '#f5f2ec';
}

// ── App state ─────────────────────────────────────────────────────────────────
let colours = parseCSV(CSV);
let activeFamily = 'all';
let searchQuery = '';
let sortKey = 'name';

// ── Render family buttons ─────────────────────────────────────────────────────
function renderFamilyButtons() {
  const container = document.getElementById('familyFilters');
  Object.entries(FAMILIES).forEach(([code, { name, rep }]) => {
    const btn = document.createElement('button');
    btn.className = 'family-btn';
    btn.dataset.family = code;
    btn.innerHTML = `<span class="swatch-dot" style="background:${rep}"></span>${name}`;
    btn.addEventListener('click', () => {
      activeFamily = code;
      document.querySelectorAll('.family-btn, .family-all').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
    container.appendChild(btn);
  });

  document.querySelector('.family-all').addEventListener('click', () => {
    activeFamily = 'all';
    document.querySelectorAll('.family-btn, .family-all').forEach(b => b.classList.remove('active'));
    document.querySelector('.family-all').classList.add('active');
    render();
  });
}

// ── Filter + sort ─────────────────────────────────────────────────────────────
function filtered() {
  let list = colours;
  if (activeFamily !== 'all') list = list.filter(c => c.family === activeFamily);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.hex.toLowerCase().includes(q)
    );
  }
  list = [...list].sort((a, b) => {
    switch (sortKey) {
      case 'name':      return a.name.localeCompare(b.name);
      case 'year':      return yearForSort(a.year) - yearForSort(b.year);
      case 'year-desc': return yearForSort(b.year) - yearForSort(a.year);
      case 'hue':       return parseFloat(a.hue) - parseFloat(b.hue);
      case 'lum':       return parseFloat(b.lum) - parseFloat(a.lum);
      case 'lum-desc':  return parseFloat(a.lum) - parseFloat(b.lum);
      case 'sat':       return parseFloat(b.sat) - parseFloat(a.sat);
      default:          return 0;
    }
  });
  return list;
}

// ── Render grid ───────────────────────────────────────────────────────────────
function render() {
  const list = filtered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const bar = document.getElementById('resultsBar');

  bar.textContent = `${list.length} colour${list.length !== 1 ? 's' : ''}`;
  grid.innerHTML = '';

  if (list.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  grid.style.display = 'grid';
  empty.style.display = 'none';

  list.forEach((c, i) => {
    const tc = textColour(c.yiq);
    const card = document.createElement('div');
    card.className = 'swatch-card';
    card.style.animationDelay = `${Math.min(i * 20, 400)}ms`;
    card.innerHTML = `
      <div class="swatch-color" style="background:${c.hex}">
        <span class="swatch-copy-hint" style="background:rgba(0,0,0,0.25);color:${tc}">${c.hex}</span>
      </div>
      <div class="swatch-info">
        <div class="swatch-name">${c.name}</div>
        <div class="swatch-hex">${c.hex.toUpperCase()}</div>
        <div class="swatch-year-mini">${c.year === 'imm.' ? 'Since antiquity' : c.year}</div>
      </div>`;
    card.addEventListener('click', () => openModal(c));
    grid.appendChild(card);
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(c) {
  const tc = textColour(c.yiq);
  const overlay = document.getElementById('modalOverlay');
  const swatch  = document.getElementById('modalSwatch');
  const hexBadge= document.getElementById('modalHexBadge');
  const name    = document.getElementById('modalName');
  const famTag  = document.getElementById('modalFamilyTag');
  const year    = document.getElementById('modalYear');
  const contrast= document.getElementById('contrastRow');
  const preview = document.getElementById('legibilityPreview');
  const datagrid= document.getElementById('modalDataGrid');
  const actions = document.getElementById('modalActions');

  swatch.style.background = c.hex;
  hexBadge.textContent = c.hex.toUpperCase();
  hexBadge.style.background = `rgba(${c.r},${c.g},${c.b},0.25)`;
  hexBadge.style.color = tc;
  name.textContent = c.name;
  famTag.textContent = FAMILIES[c.family]?.name ?? c.family;
  year.textContent = formatYear(c.year);

  // Contrast chips
  const wBadges = wcagBadges(c.wcag_w);
  const kBadges = wcagBadges(c.wcag_k);

  contrast.innerHTML = `
    <div class="contrast-chip" style="background:#ffffff;color:#1a1714">
      <span class="chip-label">on white</span>
      <span class="chip-ratio">${parseFloat(c.wcag_w).toFixed(2)}:1</span>
      <div class="chip-badges">
        ${wBadges.map(b => `<span class="wcag-badge ${b.pass ? 'wcag-pass' : 'wcag-fail'}">${b.label}</span>`).join('')}
      </div>
    </div>
    <div class="contrast-chip" style="background:#000000;color:#f5f2ec">
      <span class="chip-label">on black</span>
      <span class="chip-ratio">${parseFloat(c.wcag_k).toFixed(2)}:1</span>
      <div class="chip-badges">
        ${kBadges.map(b => `<span class="wcag-badge ${b.pass ? 'wcag-pass' : 'wcag-fail'}">${b.label}</span>`).join('')}
      </div>
    </div>`;

  // Legibility preview
  preview.innerHTML = `
    <div class="preview-block" style="background:#ffffff;color:${c.hex}">
      The quick brown fox jumps over the lazy dog.
    </div>
    <div class="preview-block" style="background:#000000;color:${c.hex}">
      The quick brown fox jumps over the lazy dog.
    </div>`;

  // Data grid
  datagrid.innerHTML = `
    <div class="data-cell"><div class="label">Hue</div><div class="value">${parseFloat(c.hue).toFixed(1)}°</div></div>
    <div class="data-cell"><div class="label">Saturation</div><div class="value">${parseFloat(c.sat).toFixed(1)}%</div></div>
    <div class="data-cell"><div class="label">Luminosity</div><div class="value">${parseFloat(c.lum).toFixed(1)}%</div></div>
    <div class="data-cell"><div class="label">Red</div><div class="value">${c.r}</div></div>
    <div class="data-cell"><div class="label">Green</div><div class="value">${c.g}</div></div>
    <div class="data-cell"><div class="label">Blue</div><div class="value">${c.b}</div></div>`;

  // Actions
  actions.innerHTML = `
    <button class="btn btn-primary" id="copyHexBtn">Copy hex</button>
    <button class="btn" id="copyRgbBtn">Copy RGB</button>
    <button class="btn" id="copyHslBtn">Copy HSL</button>
    <button class="btn" id="filterFamilyBtn">Show ${FAMILIES[c.family]?.name ?? 'family'}</button>`;

  document.getElementById('copyHexBtn').addEventListener('click', () => {
    copyText(c.hex.toUpperCase(), 'copyHexBtn', `${c.hex.toUpperCase()} copied`);
  });
  document.getElementById('copyRgbBtn').addEventListener('click', () => {
    copyText(`rgb(${c.r}, ${c.g}, ${c.b})`, 'copyRgbBtn', 'RGB copied');
  });
  document.getElementById('copyHslBtn').addEventListener('click', () => {
    copyText(`hsl(${parseFloat(c.hue).toFixed(0)}, ${parseFloat(c.sat).toFixed(0)}%, ${parseFloat(c.lum).toFixed(0)}%)`, 'copyHslBtn', 'HSL copied');
  });
  document.getElementById('filterFamilyBtn').addEventListener('click', () => {
    closeModal();
    activeFamily = c.family;
    document.querySelectorAll('.family-btn, .family-all').forEach(b => b.classList.remove('active'));
    document.querySelector(`.family-btn[data-family="${c.family}"]`)?.classList.add('active');
    render();
  });

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Copy helper ───────────────────────────────────────────────────────────────
function copyText(text, btnId, message) {
  navigator.clipboard.writeText(text).then(() => {
    showToast(message);
    const btn = document.getElementById(btnId);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    }
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortKey = e.target.value;
  render();
});

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('modalClose').addEventListener('click', closeModal);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('totalCount').textContent = `${colours.length} colours`;
renderFamilyButtons();
render();
</script>
</body>
</html>
