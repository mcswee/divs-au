<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne Radio — Station History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --accent: #d4a843;
    --accent2: #b8813a;
    --text: #e8e0d4;
    --text-muted: #7a7268;
    --text-dim: #4a4540;
    --green: #27ae60;
    --blue: #5b8dd9;
    --am: #c8965a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Source Serif 4', Georgia, serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

  .site-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 28px 32px 24px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1600px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .site-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 28px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent); line-height: 1; }
  .site-subtitle { font-family: 'Source Serif 4', serif; font-style: italic; font-weight: 300; font-size: 13px; color: var(--text-muted); margin-top: 5px; }

  .controls { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-label { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .control-row { display: flex; align-items: center; gap: 10px; }

  input[type="range"] { -webkit-appearance: none; width: 180px; height: 2px; background: var(--border); outline: none; cursor: pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 0 1px var(--accent); }

  .year-display { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 600; color: var(--accent); min-width: 56px; letter-spacing: 0.04em; line-height: 1; }

  .btn-play { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 18px; border: 1px solid var(--accent2); background: rgba(212,168,67,0.08); color: var(--accent); cursor: pointer; border-radius: 2px; display: flex; align-items: center; gap: 7px; transition: background 0.15s; }
  .btn-play:hover { background: rgba(212,168,67,0.16); }

  input[type="search"] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 0.05em; width: 190px; border-radius: 2px; outline: none; transition: border-color 0.15s; }
  input[type="search"]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); }

  .main { max-width: 1600px; margin: 0 auto; padding: 24px 32px 48px; }

  .view-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .view-tabs { display: flex; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .view-tab { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 18px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .view-tab:last-child { border-right: none; }
  .view-tab.active { background: rgba(212,168,67,0.1); color: var(--accent); }

  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 11px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.12s; }
  .chip:hover, .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(212,168,67,0.08); }

  .results-count { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
  .results-count span { color: var(--accent); font-weight: 600; }

  /* CARDS */
  #card-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }

  .station-card { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; transition: border-color 0.15s, transform 0.15s; animation: fadeIn 0.22s ease both; }
  .station-card:hover { border-color: var(--accent2); transform: translateY(-1px); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .card-header { background: var(--surface2); padding: 14px 16px 12px; border-bottom: 1px solid var(--border); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 3px; }
  .card-station-name { font-family: 'Oswald', sans-serif; font-size: 19px; font-weight: 700; letter-spacing: 0.06em; color: var(--accent); text-transform: uppercase; line-height: 1.1; }

  .card-freq-badge { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--text-muted); white-space: nowrap; letter-spacing: 0.04em; background: rgba(255,255,255,0.04); border: 1px solid var(--border); padding: 3px 8px; border-radius: 2px; margin-top: 2px; flex-shrink: 0; }
  .card-freq-badge.fm { color: var(--blue); border-color: rgba(91,141,217,0.3); background: rgba(91,141,217,0.06); }
  .card-freq-badge.am { color: var(--am); border-color: rgba(200,150,90,0.3); background: rgba(200,150,90,0.06); }

  .card-network { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent2); margin-top: 2px; }

  .card-body { padding: 12px 16px 14px; display: flex; flex-direction: column; gap: 6px; }
  .card-field { display: flex; gap: 8px; align-items: baseline; }
  .field-label { font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); white-space: nowrap; min-width: 56px; padding-top: 1px; }
  .field-value { font-size: 13px; color: var(--text); line-height: 1.35; }
  .field-value.empty { color: var(--text-dim); font-style: italic; font-size: 12px; }

  .new-tag { display: inline-block; font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); border: 1px solid rgba(39,174,96,0.4); background: rgba(39,174,96,0.08); padding: 2px 7px; border-radius: 2px; margin-left: 7px; vertical-align: middle; }

  /* TABLE */
  #table-view { overflow-x: auto; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); white-space: nowrap; }
  .data-table td { padding: 10px 16px; border-bottom: 1px solid rgba(42,42,42,0.5); vertical-align: middle; }
  .data-table tr:hover td { background: rgba(212,168,67,0.03); }
  .td-name { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; }
  .td-callsign { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em; }
  .td-freq { font-family: 'Oswald', sans-serif; font-size: 13px; white-space: nowrap; }
  .td-freq.fm { color: var(--blue); }
  .td-freq.am { color: var(--am); }
  .td-network { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent2); }
  .td-date { font-family: 'Oswald', sans-serif; font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .td-date.exact { color: var(--green); }
  .empty-cell { color: var(--text-dim); font-style: italic; font-size: 12px; }

  /* TIMELINE */
  #timeline-view { display: flex; flex-direction: column; }
  .timeline-row { display: flex; border-bottom: 1px solid rgba(42,42,42,0.4); transition: background 0.1s; }
  .timeline-row:hover { background: rgba(212,168,67,0.02); }
  .timeline-station { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; min-width: 130px; max-width: 130px; padding: 10px 14px; border-right: 1px solid var(--border); display: flex; align-items: flex-start; flex-direction: column; gap: 2px; }
  .timeline-callsign { font-size: 10px; font-weight: 400; color: var(--text-dim); letter-spacing: 0.08em; }
  .timeline-events { flex: 1; display: flex; align-items: flex-start; flex-wrap: wrap; padding: 8px 12px; gap: 8px; }
  .timeline-event { padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; min-width: 155px; max-width: 250px; }
  .event-year { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 3px; }
  .event-name { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); }
  .event-detail { font-size: 12px; color: var(--text-muted); line-height: 1.3; margin-top: 1px; }
  .event-network { font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent2); margin-top: 2px; }
  .event-freq { font-family: 'Oswald', sans-serif; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .event-freq.fm { color: var(--blue); }
  .event-freq.am { color: var(--am); }

  .empty-state { text-align: center; padding: 80px 32px; color: var(--text-dim); }
  .empty-state h3 { font-family: 'Oswald', sans-serif; font-size: 18px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; color: var(--text-muted); }

  .hidden { display: none !important; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="site-title">Melbourne Radio History</div>
      <div class="site-subtitle">Station records 1924–2026 &mdash; call signs, ownership &amp; broadcast brands</div>
    </div>
    <div class="controls">
      <div class="control-group">
        <div class="control-label">Year</div>
        <div class="control-row">
          <input type="range" id="year-slider" min="1924" max="2026" value="2026" step="1">
          <div class="year-display" id="year-label">2026</div>
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">Playback</div>
        <button class="btn-play" id="play-btn" onclick="togglePlay()">
          <span id="play-icon">▶</span><span id="play-label">Play</span>
        </button>
      </div>
      <div class="control-group">
        <div class="control-label">Search</div>
        <input type="search" id="search-input" placeholder="Station, owner, network…" oninput="render()">
      </div>
    </div>
  </div>
</header>

<main class="main">
  <div class="view-controls">
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <div class="view-tabs">
        <button class="view-tab active" onclick="setView('cards',this)">Cards</button>
        <button class="view-tab" onclick="setView('table',this)">Table</button>
        <button class="view-tab" onclick="setView('timeline',this)">Timeline</button>
      </div>
      <div class="filter-chips">
        <button class="chip active" onclick="setFilter('all',this)">All active</button>
        <button class="chip" onclick="setFilter('new',this)">New this year</button>
        <button class="chip" onclick="setFilter('owner',this)">Ownership changes</button>
        <button class="chip" onclick="setFilter('network',this)">Network changes</button>
        <button class="chip" onclick="setFilter('fm',this)">FM only</button>
        <button class="chip" onclick="setFilter('am',this)">AM only</button>
      </div>
    </div>
    <div class="results-count" id="results-count"></div>
  </div>

  <div id="card-view"></div>
  <div id="table-view" class="hidden"></div>
  <div id="timeline-view" class="hidden"></div>
</main>

const YEARS = Object.keys(RAW).map(Number).filter(y => y >= 1924 && y <= 2026).sort((a,b) => a-b);

function formatFreq(val) {
  if (!val) return { display: '', type: '' };
  const n = parseFloat(val);
  if (n >= 88 && n <= 108) {
    const s = (n % 1 === 0) ? n.toFixed(1) : n.toFixed(1);
    return { display: s + ' MHz', type: 'fm' };
  }
  if (n >= 500 && n <= 1800) return { display: Math.round(n) + ' kHz', type: 'am' };
  return { display: val, type: '' };
}

function buildCumulative() {
  const current = {};
  const result = {};
  for (const year of YEARS) {
    const changes = RAW[String(year)] || {};
    for (const [col, entry] of Object.entries(changes)) {
      if (!current[col]) current[col] = { station: '', callsign: '', owner: '', network: '', frequency: '', firstSeen: year };
      if (entry.station) current[col].station = entry.station;
      if (entry.callsign) current[col].callsign = entry.callsign;
      if (entry.owner) current[col].owner = entry.owner;
      if (entry.network) current[col].network = entry.network;
      if (entry.frequency) current[col].frequency = entry.frequency;
      current[col].lastChangeYear = year;
      current[col].lastDate = entry.date || '';
    }
    result[year] = {};
    for (const [col, state] of Object.entries(current)) result[year][col] = { ...state };
  }
  return result;
}

const CUMULATIVE = buildCumulative();

let currentYear = 2026, currentView = 'cards', currentFilter = 'all';
let playing = false, playInterval = null;

const slider = document.getElementById('year-slider');
const yearLabel = document.getElementById('year-label');

slider.addEventListener('input', () => { currentYear = parseInt(slider.value); yearLabel.textContent = currentYear; render(); });

function setView(view, el) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('card-view').classList.toggle('hidden', view !== 'cards');
  document.getElementById('table-view').classList.toggle('hidden', view !== 'table');
  document.getElementById('timeline-view').classList.toggle('hidden', view !== 'timeline');
  render();
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getEntries(year) {
  const snapshot = CUMULATIVE[year] || {};
  const yearChanges = RAW[String(year)] || {};
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  let entries = [];
  for (const [col, state] of Object.entries(snapshot)) {
    const isNew = state.firstSeen === year;
    const hasOwnerChange = !!(yearChanges[col]?.owner);
    const hasNetworkChange = !!(yearChanges[col]?.network);
    const freq = formatFreq(state.frequency);
    if (currentFilter === 'new' && !isNew) continue;
    if (currentFilter === 'owner' && !hasOwnerChange) continue;
    if (currentFilter === 'network' && !hasNetworkChange) continue;
    if (currentFilter === 'fm' && freq.type !== 'fm') continue;
    if (currentFilter === 'am' && freq.type !== 'am') continue;
    entries.push({ col, state, isNew, freq });
  }
  if (search) entries = entries.filter(e => [e.state.station, e.state.callsign, e.state.owner, e.state.network, e.freq.display].join(' ').toLowerCase().includes(search));
  entries.sort((a, b) => {
    if (a.isNew && !b.isNew) return -1;
    if (!a.isNew && b.isNew) return 1;
    return (a.state.station || a.state.callsign || '').localeCompare(b.state.station || b.state.callsign || '');
  });
  return entries;
}

function title(state) { return state.station || state.callsign || '—'; }

function effectiveDate(state, isNew) {
  if (state.lastDate) return { display: state.lastDate, exact: true };
  if (state.lastChangeYear) return { display: String(state.lastChangeYear), exact: false };
  return { display: '', exact: false };
}

function renderCards(entries) {
  const el = document.getElementById('card-view');
  if (!entries.length) { el.innerHTML = `<div class="empty-state"><h3>No stations</h3><p>No records match for ${currentYear}.</p></div>`; return; }
  el.innerHTML = entries.map((e, i) => {
    const { state, isNew, freq } = e;
    const t = title(state);
    const d = effectiveDate(state, isNew);
    return `<div class="station-card" style="animation-delay:${Math.min(i,20)*0.03}s">
      <div class="card-header">
        <div class="card-top">
          <div class="card-station-name">${t}${isNew ? `<span class="new-tag">${currentYear}</span>` : ''}</div>
          ${freq.display ? `<div class="card-freq-badge ${freq.type}">${freq.display}</div>` : ''}
        </div>
        ${state.network ? `<div class="card-network">${state.network}</div>` : ''}
      </div>
      <div class="card-body">
        ${state.callsign && state.callsign !== t ? `<div class="card-field"><span class="field-label">Call sign</span><span class="field-value">${state.callsign}</span></div>` : ''}
        <div class="card-field"><span class="field-label">Owner</span><span class="field-value ${state.owner ? '' : 'empty'}">${state.owner || 'Unknown'}</span></div>
        ${d.display ? `<div class="card-field"><span class="field-label">${isNew ? 'Launched' : 'Changed'}</span><span class="field-value" style="color:${d.exact ? 'var(--green)' : 'var(--text-muted)'}">${d.display}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderTable(entries) {
  const el = document.getElementById('table-view');
  if (!entries.length) { el.innerHTML = `<div class="empty-state"><h3>No stations</h3><p>No records for ${currentYear}.</p></div>`; return; }
  el.innerHTML = `<table class="data-table"><thead><tr>
    <th>Station Name</th><th>Call Sign</th><th>Frequency</th><th>Network / Affiliation</th><th>Owner</th><th>Effective</th>
  </tr></thead><tbody>${entries.map(e => {
    const { state, isNew, freq } = e;
    const t = title(state);
    const d = effectiveDate(state, isNew);
    return `<tr>
      <td class="td-name">${t}${isNew ? `<span class="new-tag" style="margin-left:8px">${currentYear}</span>` : ''}</td>
      <td class="td-callsign">${state.callsign && state.callsign !== t ? state.callsign : '<span class="empty-cell">—</span>'}</td>
      <td class="td-freq ${freq.type}">${freq.display || '<span class="empty-cell">—</span>'}</td>
      <td class="td-network">${state.network || '<span class="empty-cell">—</span>'}</td>
      <td>${state.owner || '<span class="empty-cell">Unknown</span>'}</td>
      <td class="td-date ${d.exact ? 'exact' : ''}">${d.display || '<span class="empty-cell">—</span>'}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function renderTimeline() {
  const el = document.getElementById('timeline-view');
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const colEvents = {};
  for (const year of YEARS) {
    if (year > currentYear) break;
    for (const [col, entry] of Object.entries(RAW[String(year)] || {})) {
      if (!Object.values(entry).some(v => v)) continue;
      if (!colEvents[col]) colEvents[col] = [];
      colEvents[col].push({ year, ...entry });
    }
  }
  const snapshot = CUMULATIVE[currentYear] || {};
  let rows = Object.entries(colEvents).map(([col, events]) => {
    const state = snapshot[col] || {};
    return { col, label: state.station || state.callsign || col, state, events };
  });
  rows.sort((a, b) => (a.state.firstSeen || 0) - (b.state.firstSeen || 0));
  if (search) rows = rows.filter(r => [r.label, r.state.callsign, r.state.owner, r.state.network, ...r.events.map(e => [e.station,e.owner,e.network].join(' '))].join(' ').toLowerCase().includes(search));
  if (!rows.length) { el.innerHTML = `<div class="empty-state"><h3>No data</h3><p>Nothing to display.</p></div>`; return; }
  el.innerHTML = rows.map(({ label, state, events }) => `
    <div class="timeline-row">
      <div class="timeline-station">
        <span>${label}</span>
        ${state.callsign && state.callsign !== label ? `<span class="timeline-callsign">${state.callsign}</span>` : ''}
      </div>
      <div class="timeline-events">
        ${events.map(e => {
          const f = formatFreq(e.frequency);
          const d = e.date || String(e.year);
          return `<div class="timeline-event">
            <div class="event-year">${d}</div>
            ${e.station ? `<div class="event-name">${e.station}</div>` : ''}
            ${e.owner ? `<div class="event-detail">${e.owner}</div>` : ''}
            ${e.network ? `<div class="event-network">${e.network}</div>` : ''}
            ${f.display ? `<div class="event-freq ${f.type}">${f.display}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function render() {
  const entries = currentView !== 'timeline' ? getEntries(currentYear) : [];
  document.getElementById('results-count').innerHTML = currentView !== 'timeline' ? `<span>${entries.length}</span> station${entries.length !== 1 ? 's' : ''}` : '';
  if (currentView === 'cards') renderCards(entries);
  else if (currentView === 'table') renderTable(entries);
  else renderTimeline();
}

function togglePlay() {
  playing = !playing;
  document.getElementById('play-icon').textContent = playing ? '⏸' : '▶';
  document.getElementById('play-label').textContent = playing ? 'Pause' : 'Play';
  if (playing) {
    if (currentYear >= 2026) { currentYear = 1924; slider.value = 1924; yearLabel.textContent = 1924; render(); }
    playInterval = setInterval(() => {
      if (currentYear >= 2026) { togglePlay(); return; }
      currentYear++; slider.value = currentYear; yearLabel.textContent = currentYear; render();
    }, 400);
  } else { clearInterval(playInterval); }
}

render();
</script>
</body>
</html>
