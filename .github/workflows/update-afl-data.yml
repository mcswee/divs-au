name: Update AFL Data

on:
  schedule:
    - cron: '0 11 * * 0'
    - cron: '0 11 * * 3'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch from Squiggle
        run: |
          mkdir -p assets/data
          curl -s "https://api.squiggle.com.au/?q=games;year=2026" -A "https://github.com/mcswee/divs-au" -o assets/data/games.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/games.json
          git diff --staged --quiet || git commit -m "Update AFL data"
          git push
