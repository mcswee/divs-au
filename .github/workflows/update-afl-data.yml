name: Update AFL Data

on:
  schedule:
    - cron: '0 11 * * 0'   # Sunday 11:00 UTC = Monday 9pm AEST (11pm AEDT)
    - cron: '0 11 * * 3'   # Wednesday 11:00 UTC = Wednesday 9pm AEST (11pm AEDT)
  workflow_dispatch:         # Also allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch from Squiggle
        run: |
          curl -s "https://api.squiggle.com.au/?q=games;year=2026" \
            -H "Accept: application/json" \
            -o assets/data/games.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json
          git diff --staged --quiet || git commit -m "Update AFL data"
          git push
